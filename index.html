    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      state.dpr = dpr;
      state.width = window.innerWidth;
      state.height = window.innerHeight;
      state.cx = state.width * 0.5;
      state.cy = state.height * 0.58;
      state.tongue.baseMaxLength = Math.max(state.width, state.height) * 0.47;
      state.tongue.maxLength = state.tongue.baseMaxLength;

      canvas.width = Math.floor(state.width * dpr);
      canvas.height = Math.floor(state.height * dpr);
      canvas.style.width = `${state.width}px`;
      canvas.style.height = `${state.height}px`;

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.imageSmoothingEnabled = false;
      createBackground();
      setupWeather();
    }

    function spawnFly() {
      let picked = weightedPick(activeSpawnPool());
      if (!isFlyUnlocked(picked, state.level)) picked = 'normal';
      if (!FLY_DEFS[picked]) return;
      if (picked === 'letter') {
        state.flies.push(new Fly('letter', pickQuestLetter()));
      } else {
        state.flies.push(new Fly(picked));
      }
    }

    function maybeSpawnFly(dt) {
      state.spawnInterval = effectiveSpawnInterval();
      state.spawnCap = effectiveSpawnCap();
      state.spawnExtraChance = effectiveSpawnExtraChance();
      state.spawnClock += dt;
      if (state.flies.length >= state.spawnCap) return;
      if (state.spawnClock < state.spawnInterval) return;

      state.spawnClock = 0;
      spawnFly();

      if (Math.random() < state.spawnExtraChance && state.flies.length < state.spawnCap) {
        spawnFly();
      }

      if (state.level === 7 && state.quest.active && state.flies.length < state.spawnCap) {
        spawnFly();
      }

      if (state.level >= 9 && Math.random() < 0.14 && state.flies.length < state.spawnCap) {
        spawnFly();
      }
    }

    function updateBackground(dt) {
      const windInfluence = state.weather.windX * dt * 0.15;
      for (const p of state.bgPattern) {
        p.x += windInfluence;
        p.y += p.drift * (11 + state.level * 1.6) * dt;
        if (p.x > state.width + 8) p.x = -8;
        if (p.x < -8) p.x = state.width + 8;
        if (p.y > state.height + 10) {
          p.y = -10;
          p.x = Math.random() * state.width;
        }
      }
    }

    function updateWeather(dt) {
      const rt = state.aiDirector.runtime;
      const rainMode = rt.weatherRainMode;
      const snowMode = rt.weatherSnowMode;
      const highWindMode = rt.weatherHighWindMode;
      const rainActive = rainMode === 'on' ? true : (rainMode === 'off' ? false : state.weather.baseRain);
      const snowActive = snowMode === 'on' ? true : (snowMode === 'off' ? false : state.weather.baseSnow);
      const highWindActive = highWindMode === 'on' ? true : (highWindMode === 'off' ? false : state.weather.baseHighWind);
      state.weather.rain = rainActive;
      state.weather.snow = snowActive;
      state.weather.highWind = highWindActive;
      state.weather.lightningChance = clamp(state.weather.baseLightningChance * rt.weatherLightningScale, 0, 0.02);
      state.weather.name = state.weather.baseName;

      if (state.level >= 10) {
        const a = Math.sin(state.frame * 0.016);
        const b = Math.cos(state.frame * 0.011 + 1.3);
        const amp = (state.weather.highWind ? 52 : 34) * rt.weatherWindScale;
        state.weather.windX = (a * 0.7 + b * 0.6) * amp;
      } else {
        const pulse = Math.sin(state.frame * 0.03) * 0.5 + Math.cos(state.frame * 0.017) * 0.35;
        const base = state.weather.baseWind * 120 * rt.weatherWindScale;
        state.weather.windX = base + pulse * (state.weather.highWind ? 85 : 35);
      }

      if (state.weather.lightningTimer > 0) {
        state.weather.lightningTimer = Math.max(0, state.weather.lightningTimer - dt);
      } else if (state.level >= 10 && Math.random() < state.weather.lightningChance) {
        state.weather.lightningTimer = 0.14 + Math.random() * 0.08;
        state.weather.lightningX = 50 + Math.random() * (state.width - 100);
        playSound('lightning');
      }

      const rivalDark = state.level >= 11 && activeRivals().length > 0
        ? (() => {
            const waveA = Math.sin(state.frame * 0.012 + state.level * 0.4) * 0.5 + 0.5;
            const waveB = Math.cos(state.frame * 0.019 + 1.7) * 0.5 + 0.5;
            const pulse = Math.max(0, waveA * 0.92 + waveB * 0.78 - 1.08);
            return Math.pow(clamp(pulse / 0.45, 0, 1), 1.15) * clamp(0.84 * rt.weatherDarknessScale, 0.14, 0.9);
          })()
        : 0;
      state.weather.darkness = clamp(state.weather.baseDarkness + rivalDark, 0, 0.72);
      if (state.weather.darkness > 0.46) state.weather.name = `${state.weather.baseName} · DARK`;

      if (state.effects.timeFreeze > 0) return;

      for (const p of state.weather.particles) {
        if (state.weather.rain) {
          p.x += (state.weather.windX * 0.5 + p.vx) * dt;
          p.y += p.vy * 1.6 * dt;
        } else if (state.weather.snow) {
          p.x += (state.weather.windX * 0.36 + Math.sin((state.frame + p.len) * 0.03) * 24) * dt;
          p.y += (18 + p.vy * 0.55) * dt;
        } else if (state.weather.highWind) {
          p.x += (state.weather.windX * 1.12 + p.vx * 0.6) * dt;
          p.y += Math.sin((state.frame + p.len) * 0.03) * 6 * dt;
        } else {
          p.x += (state.weather.windX * 0.22 + p.vx * 0.2) * dt;
          p.y += (9 + p.vy * 0.2) * dt;
        }

        if (p.x > state.width + 26) p.x = -26;
        if (p.x < -26) p.x = state.width + 26;
        if (p.y > state.height + 26) {
          p.y = -18;
          p.x = Math.random() * state.width;
        }
      }
    }

    function triggerJump(dir = state.frog.facing) {
      if (state.mode !== MODE.PLAYING) return;
      if (state.level < 3) return;
      if (state.frog.jumpCooldown > 0) return;
      clearMobileJumpArm();
      const v = getVector(dir);
      const jumpBoost = state.effects.loveJump > 0 ? 1.3 : 1;
      state.frog.vx += v.dx * 320 * jumpBoost;
      state.frog.vy += v.dy * 210 * jumpBoost;
      state.frog.jumpVZ = 560 * (state.effects.loveJump > 0 ? 1.18 : 1);
      state.frog.landSquash = 0;
      state.frog.jumpCooldown = state.effects.loveJump > 0 ? 0.48 : 0.72;
      addFloatText(
        frogX(),
        frogY() - 72,
        state.effects.loveJump > 0
          ? (isHindi() ? `LOVE छलांग ${getLocalizedDirection(dir)}` : `LOVE LEAP ${dir}`)
          : (isHindi() ? `छलांग ${getLocalizedDirection(dir)}` : `JUMP ${dir}`),
        '#c8ffd8'
      );
      playSound('shoot');
      updateHud();
    }

    function resolveShotDirection(dir) {
      let shotDir = dir;
      if (state.effects.drunk > 0) {
        shotDir = rotateDir90(dir, Math.random() < 0.5 ? 1 : -1);
        addFloatText(frogX(), frogY() - 54, isHindi() ? `डगमग ${getLocalizedDirection(dir)}→${getLocalizedDirection(shotDir)}` : `WOBBLE ${dir}->${shotDir}`, '#ffc6ff');
      }
      return shotDir;
    }

    function shootTongue(dir) {
      if (state.mode === MODE.PAUSED || state.mode === MODE.LEVEL_UP || state.mode === MODE.GAME_OVER || state.mode === MODE.WIN) return;
      if (state.tongue.state !== 'IDLE') return;

      ensureAudio();
      if (state.mode === MODE.START) {
        startGameFromMenu();
      }
      if (state.mode !== MODE.PLAYING) return;

      state.frog.facing = dir;
      const shotDir = resolveShotDirection(dir);
      const v = getVector(shotDir);

      state.tongue.state = 'OUT';
      state.tongue.dirName = shotDir;
      state.tongue.dx = v.dx;
      state.tongue.dy = v.dy;
      state.tongue.length = 0;
      state.tongue.outSpeed = 1380;
      state.tongue.retractSpeed = 0;
      state.tongue.caughtFlies = [];
      state.tongue.maxLength = state.tongue.baseMaxLength;
      state.tongue.drunkShot = state.effects.drunk > 0;
      state.tongue.drunkArcDir = Math.random() < 0.5 ? -1 : 1;
      if (state.effects.medicinal > 0) {
        if (isReversePressed(shotDir)) {
          state.tongue.outSpeed = 130;
          state.tongue.maxLength = Math.max(68, state.tongue.baseMaxLength * 0.16);
          addFloatText(frogX(), frogY() - 54, isHindi() ? 'औषधि ब्रेक' : 'MED BRAKE', '#d8ffe9');
        }
      }
      playSound('shoot');
      startBitMusic();
      updateHud();
    }

    function startGameFromMenu() {
      ensureAudio();
      resetRun();
      state.mode = MODE.PLAYING;
      startBitMusic();
      updateHud();
    }

    function togglePause() {
      if (state.mode === MODE.PLAYING) state.mode = MODE.PAUSED;
      else if (state.mode === MODE.PAUSED) state.mode = MODE.PLAYING;
      if (state.mode !== MODE.PLAYING) clearMobileJumpArm();
      if (state.mode === MODE.PLAYING) startBitMusic();
      updateHud();
    }

    async function toggleFullscreen() {
      if (!document.fullscreenElement) {
        try {
          await document.documentElement.requestFullscreen();
        } catch (_) {}
      } else {
        try {
          await document.exitFullscreen();
        } catch (_) {}
      }
      resize();
    }

    function triggerBombPenalty(fly) {
      playSound('bomb');
      const penalty = Math.max(80, Math.floor(state.level * 24 + state.score * 0.2));
      state.score = Math.max(0, state.score - penalty);
      state.combo = 1;
      state.comboChain = 0;
      state.comboTimer = 0;
      state.shakeTimer = 0.62;
      state.shakePower = 15;
      spawnBurst(fly.x, fly.y, '#ff6767', 40, 0.8);
      addFloatText(fly.x, fly.y - 30, isHindi() ? `-${penalty} बम` : `-${penalty} BOMB`, '#ff9a9a');
      saveHighScore();
      updateHud();
    }

    function triggerSweep(range, options = {}) {
      state.sweep.active = true;
      state.sweep.timer = options.duration || state.sweep.duration;
      state.sweep.angle = options.startAngle || 0;
      state.sweep.speed = options.speed || Math.PI * 7.2;
      state.sweep.range = range;
      state.sweep.protectBombs = !!options.protectBombs;
      playSound('sweep');
      addFloatText(frogX(), frogY() - 92, options.label || (isHindi() ? '360 झाड़ू वार' : '360 SWEEP'), '#d9ffb5');
      updateHud();
    }

    function updateSweep(dt) {
      if (!state.sweep.active) return;

      state.sweep.timer -= dt;
      state.sweep.angle += state.sweep.speed * dt;
      if (state.sweep.timer <= 0) {
        state.sweep.active = false;
        state.sweep.timer = 0;
        return;
      }

      const ox = frogX();
      const oy = frogY() + 18;
      const ex = ox + Math.cos(state.sweep.angle) * state.sweep.range;
      const ey = oy + Math.sin(state.sweep.angle) * state.sweep.range;

      const caught = [];
      for (let i = state.flies.length - 1; i >= 0; i--) {
        const f = state.flies[i];
        const dist = distPointToSegment(f.x, f.y, ox, oy, ex, ey);
        const threshold = f.radius + (state.effects.medicinal > 0 ? 14 : 10);
        if (dist <= threshold) {
          caught.push(state.flies[i]);
          state.flies.splice(i, 1);
        }
      }

      for (const f of caught) {
        spawnBurst(f.x, f.y, f.color, 8, 0.4);
        onCatch(f, f.x, f.y, { fromSweep: true, protectBombs: state.sweep.protectBombs });
      }
    }

    function handleLetterCatch(fly) {
      const expected = state.quest.target[state.quest.progress] || '';
      if (fly.letter === expected) {
        state.quest.progress += 1;
        state.score += 100;
        addFloatText(fly.x, fly.y - 24, isHindi() ? `+100 अक्षर ${fly.letter}` : `+100 ${fly.letter}`, '#ddf3ff');
        playCatchCelebrate(fly);
        if (state.quest.progress >= state.quest.target.length) {
          const clearedWord = state.quest.target;
          state.score += state.quest.reward;
          spawnBurst(state.cx, state.cy, '#b8f8ff', 45, 0.9);
          playSound('level');
          if (clearedWord === 'LOVE') {
            state.effects.loveJump = Math.max(state.effects.loveJump, 14);
            state.effects.loveRain = Math.max(state.effects.loveRain, 6.5);
            spawnQuestHeartRain(44);
            addFloatText(state.cx, state.cy - 115, isHindi() ? `LOVE पूरा +${state.quest.reward}` : `LOVE COMPLETE +${state.quest.reward}`, '#ffb7df');
            addFloatText(frogX(), frogY() - 92, isHindi() ? 'दिल छलांग तैयार' : 'HEART LEAP READY', '#ffd4ef');
            state.quest.wordIndex = 1;
            state.quest.target = state.quest.words[1];
            state.quest.label = state.quest.target;
            state.quest.reward = 700;
            state.quest.spawnCycle = 0;
            state.quest.progress = 0;
          } else {
            state.quest.completed = true;
            state.effects.hopeHalo = Math.max(state.effects.hopeHalo, 10.5);
            state.effects.hopeGiant = Math.max(state.effects.hopeGiant, 10.5);
            state.health.frog = Math.min(state.health.maxFrog, state.health.frog + 34);
            state.lives = Math.max(0, Math.ceil(state.health.frog / 20));
            triggerSweep(360, { duration: 7.8, protectBombs: true, label: isHindi() ? 'हेलो झाड़ू' : 'HALO SWEEP' });
            addFloatText(state.cx, state.cy - 115, isHindi() ? `HOPE पूरा +${state.quest.reward}` : `HOPE COMPLETE +${state.quest.reward}`, '#b8f8ff');
            addFloatText(frogX(), frogY() - 92, isHindi() ? 'विशाल HOPE रूप' : 'GIANT HOPE FORM', '#fff3b2');
          }
        }
      } else {
        state.quest.progress = Math.max(0, state.quest.progress - 1);
        state.combo = 1;
        state.comboChain = 0;
        addFloatText(fly.x, fly.y - 24, isHindi() ? `गलत ${fly.letter}` : `WRONG ${fly.letter}`, '#ffb6d6');
      }
      saveHighScore();
      updateHud();
    }

    function onCatch(fly, x, y, options = {}) {
      const protectBombs = !!options.protectBombs || state.effects.medicinal > 0;
      state.comboChain += 1;
      state.combo = Math.min(6, 1 + Math.floor(state.comboChain / 3));
      state.comboTimer = 2.5;

      if (fly.id === 'bomb') {
        if (protectBombs) {
          playSound('medicine');
          state.score += 12;
          addFloatText(x, y - 24, isHindi() ? 'बम ढाल ने रोका' : 'BOMB SHIELDED', '#b8ffd9');
          saveHighScore();
          updateHud();
          return;
        }
        triggerBombPenalty(fly);
        return;
      }

      if (fly.id === 'letter') {
        handleLetterCatch(fly);
        return;
      }

      if (fly.id === 'firefly') {
        playCatchCelebrate(fly);
        const boost = 35 * state.combo;
        state.score += boost;
        addFloatText(x, y - 20, isHindi() ? `जुगनू +${boost}` : `FIREFLY +${boost}`, '#fff9a8');
        if (state.level >= 11 && activeRivals().length > 0 && state.weather.darkness > 0.4) {
          state.effects.glow = Math.max(state.effects.glow, 4.2);
          state.effects.nightVision = Math.max(state.effects.nightVision, 7.5);
          addFloatText(frogX(), frogY() - 92, isHindi() ? 'रात-दृष्टि तैयार' : 'NIGHT VISION READY', '#fff3a6');
        }
        saveHighScore();
        updateHud();
        return;
      }

      if (fly.id === 'hourglass') {
        playCatchCelebrate(fly);
        state.score += fly.points * state.combo;
        state.effects.timeFreeze = Math.max(state.effects.timeFreeze, 4.8);
        addFloatText(x, y - 20, isHindi() ? 'समय थम गया!' : 'TIME STOPS!', '#ccefff');
        playSound('freeze');
        saveHighScore();
        updateHud();
        return;
      }

      if (fly.id === 'poison') {
        playCatchCelebrate(fly);
        state.effects.drunk = Math.max(state.effects.drunk, 8.5);
        state.effects.glow = Math.max(state.effects.glow, 3.5);
        state.score += fly.points * state.combo;
        addFloatText(x, y - 20, isHindi() ? 'ज़हर: जीभ भटकी' : 'POISON: LOOPY TONGUE', '#e8b8ff');
        saveHighScore();
        updateHud();
        return;
      }

      if (fly.id === 'spiral') {
        playCatchCelebrate(fly);
        state.effects.spiral = Math.max(state.effects.spiral, 8.5);
        state.score += fly.points * state.combo;
        addFloatText(x, y - 20, isHindi() ? 'स्पाइरल ड्रिल चालू' : 'SPIRAL DRILL ACTIVE', '#b8e7ff');
        saveHighScore();
        updateHud();
        return;
      }

      if (fly.id === 'medicinal') {
        playCatchCelebrate(fly);
        state.effects.medicinal = Math.max(state.effects.medicinal, 10.5);
        state.health.frog = Math.min(state.health.maxFrog, state.health.frog + 24);
        state.lives = Math.max(0, Math.ceil(state.health.frog / 20));
        state.score += fly.points * state.combo;
        addFloatText(x, y - 20, isHindi() ? 'औषधि: ढाल + बम बचाव + भरपाई' : 'MEDICINE: SHIELD + BOMB + REGEN', '#ffe68a');
        saveHighScore();
        updateHud();
        return;
      }

      playCatchCelebrate(fly);
      const gained = fly.points * state.combo;
      state.score += gained;
      addFloatText(x, y - 16, isHindi() ? getHindiCatchText(fly, gained) : `+${gained}`, '#f0ffd8');
      saveHighScore();
      updateHud();
    }

    function levelReadyToAdvance() {
      if (state.level === 12 && state.finalChallenge.active) {
        return state.finalChallenge.timer <= 0 && state.mode === MODE.PLAYING;
      }
      if (state.level === 7 && state.quest.active) {
        return state.quest.completed || state.quest.timer <= 0;
      }
      if (state.score < state.levelGoal) return false;
      if (state.quest.active && !state.quest.completed) return false;
      for (const rv of activeRivals()) {
        if (state.score <= rv.score) return false;
      }
      return true;
    }

    function spawnLoveHearts() {
      state.ending.hearts = [];
      for (let i = 0; i < 72; i++) {
        state.ending.hearts.push({
          x: Math.random() * state.width,
          y: -Math.random() * state.height,
          vy: 22 + Math.random() * 18,
          drift: (Math.random() - 0.5) * 14,
          target: ''
        });
      }
      state.ending.timer = 0;
      state.ending.leftCatchTimer = 0;
      state.ending.rightCatchTimer = 0;
      state.ending.leftTongue.angle = 0;
      state.ending.leftTongue.len = 38;
      state.ending.leftTongue.retarget = 0;
      state.ending.leftTongue.aimAngle = 0;
      state.ending.leftTongue.aimLen = 38;
      state.ending.rightTongue.angle = Math.PI;
      state.ending.rightTongue.len = 38;
      state.ending.rightTongue.retarget = 0;
      state.ending.rightTongue.aimAngle = Math.PI;
      state.ending.rightTongue.aimLen = 38;
    }

    function spawnQuestHeartRain(amount = 36) {
      for (let i = 0; i < amount; i++) {
        const px = Math.random() * state.width;
        const py = -Math.random() * state.height * 0.45;
        const p = new Particle(px, py, Math.random() < 0.5 ? '#ff8fc8' : '#ffd2ea', '<3', 1.4 + Math.random() * 0.9);
        p.vx = (Math.random() - 0.5) * 22;
        p.vy = 72 + Math.random() * 72;
        state.particles.push(p);
      }
    }

    function triggerLevelAdvance() {
      if (state.level === 7 && state.quest.active && state.quest.timer <= 0 && !state.quest.completed) {
        state.quest.timedOut = true;
        addFloatText(state.cx, state.cy - 110, isHindi() ? 'क्वेस्ट समय बंद' : 'QUEST WINDOW CLOSED', '#d6e8ff');
      }
      if (activeRivals().length > 0) {
        for (const rv of activeRivals()) {
          rv.result = `YOU BEAT ${rv.name}`;
        }
      }
      if (state.level >= state.maxLevel) {
        state.mode = MODE.WIN;
        state.rival.result = '';
        state.rival2.result = '';
        spawnLoveHearts();
        playSound('love');
        startBitMusic();
        updateHud();
        return;
      }
      state.mode = MODE.LEVEL_UP;
      state.levelPauseTimer = 1.4;
      playSound('level');
      spawnBurst(state.cx, state.cy, state.currentEnv.frogColor, 55, 0.9);
      updateHud();
    }

    function cheatNextLevel() {
      if (state.mode === MODE.START) startGameFromMenu();
      if (state.mode !== MODE.PLAYING) return;
      if (state.level === 12 && state.finalChallenge.active) {
        state.finalChallenge.timer = 0;
      } else {
        state.score = Math.max(state.score, state.levelGoal);
      }
      for (const rv of activeRivals()) {
        rv.score = Math.min(rv.score, state.score - 1);
      }
      if (state.quest.active && !state.quest.completed) {
        state.quest.completed = true;
        state.quest.progress = state.quest.target.length;
      }
      addFloatText(state.cx, state.cy - 120, isHindi() ? 'चीट: अगला स्तर' : 'CHEAT: NEXT LEVEL', '#afffe0');
      triggerLevelAdvance();
    }

    function cheatSweep() {
      if (state.mode === MODE.START) startGameFromMenu();
      if (state.mode !== MODE.PLAYING) return;
      addFloatText(state.cx, state.cy - 120, isHindi() ? 'चीट: 360 झाड़ू' : 'CHEAT: 360 SWEEP', '#a8dcff');
      triggerSweep(430, { protectBombs: true, duration: 1.0, speed: Math.PI * 9.2, label: isHindi() ? 'चीट झाड़ू' : 'CHEAT SWEEP' });
    }

    function updateFrogMotion(dt) {
      state.frog.jumpCooldown = Math.max(0, state.frog.jumpCooldown - dt);
      const airborne = state.frog.jumpZ > 0 || state.frog.jumpVZ > 0;
      const spring = airborne ? 4.2 : 6.2;
      const drag = airborne ? 2.0 : 2.9;
      state.frog.vx += (-state.frog.ox * spring - state.frog.vx * drag) * dt;
      state.frog.vy += (-state.frog.oy * spring - state.frog.vy * drag) * dt;
      state.frog.ox += state.frog.vx * dt;
      state.frog.oy += state.frog.vy * dt;
      if (airborne) {
        state.frog.jumpVZ -= 1550 * dt;
        state.frog.jumpZ += state.frog.jumpVZ * dt;
        if (state.frog.jumpZ <= 0) {
          state.frog.jumpZ = 0;
          if (state.frog.jumpVZ < -200) {
            state.frog.landSquash = 1;
          }
          state.frog.jumpVZ = 0;
        }
      }
      state.frog.landSquash = Math.max(0, state.frog.landSquash - dt * 4.8);
      state.frog.ox = clamp(state.frog.ox, -240, 240);
      state.frog.oy = clamp(state.frog.oy, -180, 180);
    }

    function updateSingleRival(dt, rv) {
      if (!rv.active) return;
      if (state.mode !== MODE.PLAYING) return;
      if (rv.health <= 0) return;
      const aiSpeed = state.aiDirector.runtime.rivalSpeedScale;
      const aiAgg = state.aiDirector.runtime.rivalAggressionScale;
      const aiCornerHop = state.aiDirector.runtime.rivalCornerHopScale;
      rv.eatCooldown = Math.max(0, rv.eatCooldown - dt);
      rv.disturbCooldown = Math.max(0, rv.disturbCooldown - dt);
      rv.hitCooldown = Math.max(0, rv.hitCooldown - dt);

      if (rv.type === 'chameleon') {
        rv.cornerTimer -= dt;
        if (rv.cornerTimer <= 0) {
          const next = (rv.cornerIndex + 1 + Math.floor(Math.random() * 3)) % 4;
          snapRivalToCorner(rv, next);
          rv.cornerTimer = (1.8 + Math.random() * 2.2) / aiCornerHop;
          addFloatText(rv.x, rv.y - 28, isHindi() ? 'गिरगिट बदल गया' : 'CHAMELEON SHIFT', '#b9ffe1');
        }

        if (rv.eatCooldown <= 0 && !rv.chTongue.active) {
          launchChameleonTongue(rv);
        }
        updateChameleonTongue(rv, dt);

        const ux = frogX();
        const uy = frogY();
        const ddx = ux - rv.x;
        const ddy = uy - rv.y;
        const userDist = Math.hypot(ddx, ddy);
        if (userDist < 88 && rv.disturbCooldown <= 0) {
          rv.disturbCooldown = 0.85;
          const shielded = state.effects.medicinal > 0;
          const push = 150 * rv.aggression * aiAgg * (shielded ? 0.18 : 1);
          const a = Math.atan2(ddy, ddx);
          state.frog.vx += Math.cos(a) * push;
          state.frog.vy += Math.sin(a) * push;
          if (shielded) {
            playSound('medicine');
            addFloatText(frogX(), frogY() - 70, isHindi() ? 'ढाल ने वार रोका' : 'SHIELD BODY BLOCK', '#d8ffe9');
          } else {
            applyFrogDamage(8, isHindi() ? getHindiRivalEvent('CHAMELEON', 'hit') : 'CHAMELEON HIT!', '#ffc4b2', 'CHAMELEON');
            playSound('bumpChameleon');
          }
        }

        if (rv.score >= rv.target && rv.score > state.score + 20) {
          rv.result = isHindi() ? getHindiRivalEvent(rv.name, 'wins') : `${rv.name} WINS`;
          state.mode = MODE.GAME_OVER;
        }
        return;
      }

      let nearest = null;
      let nearestDist = Infinity;
      for (let i = 0; i < state.flies.length; i++) {
        const f = state.flies[i];
        if (f.camouflaged) continue;
        const dx = f.x - rv.x;
        const dy = f.y - rv.y;
        const d2 = dx * dx + dy * dy;
        if (d2 < nearestDist) {
          nearestDist = d2;
          nearest = { fly: f, index: i, dx, dy, dist: Math.sqrt(d2) };
        }
      }

      if (nearest) {
        const targetAngle = Math.atan2(nearest.dy, nearest.dx);
        const accel = (rv.type === 'chameleon' ? 240 : 180) * rv.speed * aiSpeed;
        rv.vx += Math.cos(targetAngle) * accel * dt;
        rv.vy += Math.sin(targetAngle) * accel * dt;
      } else {
        const fx = frogX();
        const fy = frogY();
        const angle = Math.atan2(fy - rv.y, fx - rv.x) + Math.PI / 2;
        const accel = 95 * rv.speed * aiSpeed;
        rv.vx += Math.cos(angle) * accel * dt;
        rv.vy += Math.sin(angle) * accel * dt;
      }

      rv.vx *= 0.94;
      rv.vy *= 0.94;
      rv.x += rv.vx * dt;
      rv.y += rv.vy * dt;
      rv.x += state.weather.windX * dt * 0.22;
      rv.x = clamp(rv.x, 40, state.width - 40);
      rv.y = clamp(rv.y, 50, state.height - 50);

      if (nearest && rv.eatCooldown <= 0 && nearest.dist <= (rv.type === 'chameleon' ? 34 : 30)) {
        const f = state.flies.splice(nearest.index, 1)[0];
        if (f) {
          const gain = f.id === 'bomb' ? 14 : Math.max(6, f.points);
          rv.score += gain;
          rv.eatCooldown = rv.type === 'chameleon' ? 0.1 : 0.16;
          spawnBurst(rv.x, rv.y, rv.type === 'chameleon' ? '#9fffd5' : '#78b7ff', 8, 0.38);
          addFloatText(
            rv.x,
            rv.y - 26,
            isHindi() ? `${getHindiRivalEvent(rv.name, 'score')}${gain}` : `${rv.name} +${gain}`,
            rv.type === 'chameleon' ? '#9fffd5' : '#9fd0ff'
          );
        }
      }

      const ux = frogX();
      const uy = frogY();
      const ddx = ux - rv.x;
      const ddy = uy - rv.y;
      const userDist = Math.hypot(ddx, ddy);
      const disturbRange = rv.type === 'chameleon' ? 95 : 78;
      if (userDist < disturbRange && rv.disturbCooldown <= 0) {
        const shielded = state.effects.medicinal > 0;
        const push = (rv.type === 'chameleon' ? 220 : 160) * rv.aggression * aiAgg * (shielded ? 0.2 : 1);
        const a = Math.atan2(ddy, ddx);
        state.frog.vx += Math.cos(a) * push;
        state.frog.vy += Math.sin(a) * push;
        rv.disturbCooldown = rv.type === 'chameleon' ? 0.52 : 0.78;
        if (shielded) {
          playSound('medicine');
          addFloatText(frogX(), frogY() - 78, isHindi() ? 'ढाल ने धक्का रोका' : 'SHIELD BUMP BLOCK', '#d8ffe9');
        } else {
          playSound(rv.type === 'chameleon' ? 'bumpChameleon' : 'bumpBlue');
          addFloatText(frogX(), frogY() - 82, isHindi() ? getHindiRivalEvent(rv.name, 'bump') : `${rv.name} BUMP!`, '#ffcfb6');
          applyFrogDamage(6, isHindi() ? getHindiRivalEvent(rv.name, 'bump') : `${rv.name} BUMP!`, '#ffcfb6', rv.name);
        }
      }

      if (rv.score >= rv.target && rv.score > state.score + 20) {
        rv.result = isHindi() ? getHindiRivalEvent(rv.name, 'wins') : `${rv.name} WINS`;
        state.mode = MODE.GAME_OVER;
      }
    }

    function updateRivals(dt) {
      updateSingleRival(dt, state.rival);
      updateSingleRival(dt, state.rival2);
    }

    function updateFinalChallenge(dt) {
      if (!state.finalChallenge.active || state.mode !== MODE.PLAYING) return;
      if (state.level !== 12) return;

      state.finalChallenge.timer = Math.max(0, state.finalChallenge.timer - dt);
      // Chameleon now attacks via corner tongue strikes (handled in updateSingleRival).
      // Keep legacy bullets cleared so old state never leaks into the final challenge.
      state.finalChallenge.bullets = [];
    }

    function getTonguePoint(distance) {
      const tongue = state.tongue;
      const startX = frogX();
      const startY = frogY() + 18;
      let x = startX + tongue.dx * distance;
      let y = startY + tongue.dy * distance;

      if (tongue.drunkShot) {
        const half = tongue.maxLength * 0.5;
        if (distance > half) {
          const t = clamp((distance - half) / Math.max(1, half), 0, 1);
          const px = -tongue.dy;
          const py = tongue.dx;
          const arcRadius = half * 0.42;
          const theta = t * Math.PI * 1.35 * tongue.drunkArcDir;
          x += px * arcRadius * (1 - Math.cos(theta));
          y += py * arcRadius * (1 - Math.cos(theta));
          x += tongue.dx * arcRadius * 0.35 * Math.sin(theta);
          y += tongue.dy * arcRadius * 0.35 * Math.sin(theta);
        }
      }

      return { x, y };
    }

    function getTongueSamplesForCollision() {
      const samples = [];
      const tongue = state.tongue;
      const sticky = state.effects.medicinal > 0;
      const step = sticky ? 10 : 16;

      if (sticky) {
        for (let d = 12; d <= tongue.length; d += step) {
          samples.push(getTonguePoint(d));
        }
      }

      const tip = getTonguePoint(tongue.length);
      samples.push(tip);

      if (state.effects.spiral > 0) {
        const r = 20 + Math.abs(Math.sin(tongue.spinPhase)) * 12;
        for (let i = 0; i < 8; i++) {
          const a = tongue.spinPhase + (Math.PI * 2 * i) / 8;
          samples.push({ x: tip.x + Math.cos(a) * r, y: tip.y + Math.sin(a) * r });
        }
      }

      return samples;
    }

    function fliesCanChainTogether(a, b) {
      if (!a || !b) return false;
      if (a.id !== b.id) return false;
      if (a.id === 'letter') return a.letter === b.letter;
      return true;
    }

    function collectTongueRow(anchorFly, base, tip) {
      if (!anchorFly) return [];
      const abx = tip.x - base.x;
      const aby = tip.y - base.y;
      const segLen = Math.max(1, Math.hypot(abx, aby));
      const segLen2 = Math.max(1, segLen * segLen);
      const gapRatio = Math.min(0.24, 92 / segLen);
      const width = anchorFly.radius + 18;
      const projections = [];

      for (const fly of state.flies) {
        if (!fliesCanChainTogether(anchorFly, fly)) continue;
        const apx = fly.x - base.x;
        const apy = fly.y - base.y;
        const t = clamp((apx * abx + apy * aby) / segLen2, -0.08, 1.08);
        const cx = base.x + abx * t;
        const cy = base.y + aby * t;
        const dist = Math.hypot(fly.x - cx, fly.y - cy);
        if (dist > width) continue;
        projections.push({ fly, t });
      }

      projections.sort((a, b) => a.t - b.t);
      const anchorIndex = projections.findIndex((entry) => entry.fly === anchorFly);
      if (anchorIndex === -1) return [anchorFly];

      const chain = [anchorFly];
      let prevT = projections[anchorIndex].t;
      for (let i = anchorIndex + 1; i < projections.length; i++) {
        if (projections[i].t - prevT > gapRatio) break;
        chain.push(projections[i].fly);
        prevT = projections[i].t;
      }

      prevT = projections[anchorIndex].t;
      for (let i = anchorIndex - 1; i >= 0; i--) {
        if (prevT - projections[i].t > gapRatio) break;
        chain.unshift(projections[i].fly);
        prevT = projections[i].t;
      }

      return chain;
    }

    function getBestRowOpportunity() {
      let best = null;
      for (let i = 0; i < state.flies.length; i++) {
        const a = state.flies[i];
        for (let j = i + 1; j < state.flies.length; j++) {
          const b = state.flies[j];
          if (!fliesCanChainTogether(a, b)) continue;
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const dist = Math.hypot(dx, dy);
          if (dist < 70 || dist > 280) continue;
          const dirX = dx / dist;
          const dirY = dy / dist;
          const chain = [a, b];
          for (let k = 0; k < state.flies.length; k++) {
            if (k === i || k === j) continue;
            const f = state.flies[k];
            if (!fliesCanChainTogether(a, f)) continue;
            const apx = f.x - a.x;
            const apy = f.y - a.y;
            const along = apx * dirX + apy * dirY;
            if (along < -20 || along > dist + 20) continue;
            const side = Math.abs(apx * dirY - apy * dirX);
            if (side > f.radius + 16) continue;
            chain.push(f);
          }
          const unique = [...new Set(chain)];
          const candidate = { a, b, chain: unique, dist };
          if (!best || candidate.chain.length > best.chain.length || (candidate.chain.length === best.chain.length && candidate.dist > best.dist)) {
            best = candidate;
          }
        }
      }
      return best;
    }

    function launchTongueVector(dx, dy, dirName, options = {}) {
      state.tongue.state = 'OUT';
      state.tongue.dirName = dirName;
      state.tongue.dx = dx;
      state.tongue.dy = dy;
      state.tongue.length = 0;
      state.tongue.outSpeed = options.outSpeed || 1380;
      state.tongue.retractSpeed = 0;
      state.tongue.caughtFlies = [];
      state.tongue.maxLength = options.maxLength || state.tongue.baseMaxLength;
      state.tongue.drunkShot = !!options.drunkShot;
      state.tongue.drunkArcDir = Math.random() < 0.5 ? -1 : 1;
    }

    function triggerMedicinalLineShot() {
      if (state.mode !== MODE.PLAYING) return;
      if (state.effects.medicinal <= 0) return;
      if (state.tongue.state !== 'IDLE') return;
      const best = getBestRowOpportunity();
      if (!best || best.chain.length < 2) {
        addFloatText(frogX(), frogY() - 72, isHindi() ? 'सीधी लाइन नहीं' : 'NO CLEAR LINE', '#dbeaff');
        return;
      }
      const anchor = best.chain.reduce((closest, fly) => {
        const d = Math.hypot(fly.x - frogX(), fly.y - frogY());
        return !closest || d < closest.dist ? { fly, dist: d } : closest;
      }, null).fly;
      const target = best.chain.reduce((farthest, fly) => {
        const d = Math.hypot(fly.x - frogX(), fly.y - frogY());
        return !farthest || d > farthest.dist ? { fly, dist: d } : farthest;
      }, null).fly;
      const dx = target.x - frogX();
      const dy = target.y - (frogY() + 18);
      const dist = Math.max(1, Math.hypot(dx, dy));
      state.frog.facing = Math.abs(dx) > Math.abs(dy) ? (dx >= 0 ? 'RIGHT' : 'LEFT') : (dy >= 0 ? 'DOWN' : 'UP');
      state.medAim.active = true;
      state.medAim.timer = 0.7;
      state.medAim.fromX = anchor.x;
      state.medAim.fromY = anchor.y;
      state.medAim.toX = target.x;
      state.medAim.toY = target.y;
      state.medAim.flies = best.chain.length;
      launchTongueVector(dx / dist, dy / dist, 'MEDLINE', {
        outSpeed: 1500,
        maxLength: Math.min(state.tongue.baseMaxLength, dist + 120),
        drunkShot: false
      });
      playSound('medicine');
      addFloatText(
        (anchor.x + target.x) * 0.5,
        (anchor.y + target.y) * 0.5 - 22,
        isHindi() ? `धूम लाइन x${best.chain.length}` : `MED LINE x${best.chain.length}`,
        '#dfffd0'
      );
      startBitMusic();
      updateHud();
    }

    function hitRivalWithTongue(rv, damage) {
      if (!rv.active || rv.health <= 0) return;
      rv.health = Math.max(0, rv.health - damage);
      rv.hitCooldown = 0.42;
      playSound(rv.type === 'chameleon' ? 'bumpChameleon' : 'bumpBlue');
      spawnBurst(rv.x, rv.y, rv.type === 'chameleon' ? '#b9ffe8' : '#9ac8ff', 7, 0.32);
      addFloatText(rv.x, rv.y - 24, isHindi() ? `-${damage} जान` : `-${damage} HP`, '#ffd8b6');

      if (rv.health <= 0) {
        rv.active = false;
        rv.vx = 0;
        rv.vy = 0;
        rv.result = `${rv.name} DOWN`;
        addFloatText(rv.x, rv.y - 48, isHindi() ? getHindiRivalEvent(rv.name, 'defeated') : `${rv.name} DEFEATED`, '#ffe8ae');
      }
    }

    function updateTongue(dt) {
      const tongue = state.tongue;
      if (tongue.state === 'IDLE') return;

      if (tongue.state === 'OUT') {
        tongue.outSpeed = Math.max(260, tongue.outSpeed * 0.9);
        if (state.effects.medicinal > 0) {
          if (isReversePressed(tongue.dirName || state.frog.facing)) {
            tongue.outSpeed = Math.max(45, tongue.outSpeed * 0.34);
            tongue.maxLength = Math.min(tongue.maxLength, Math.max(52, tongue.length + 8));
            if (tongue.length > 20) {
              tongue.state = 'IN';
              tongue.retractSpeed = 300;
            }
          }
        }
        tongue.length += tongue.outSpeed * dt;
        tongue.spinPhase += dt * (state.effects.spiral > 0 ? 20 : 8);

        const sticky = state.effects.medicinal > 0;
        const samples = getTongueSamplesForCollision();

        let caughtAny = false;
        const caughtRefs = new Set();
        const caughtOrdered = [];
        const base = getTonguePoint(0);
        const tip = getTonguePoint(tongue.length);
        for (let i = 0; i < state.flies.length; i++) {
          const f = state.flies[i];
          if (caughtRefs.has(f)) continue;
          const threshold = f.radius + (state.effects.spiral > 0 ? 18 : 10) + (sticky ? 36 : 0);
          let hit = false;
          for (const s of samples) {
            const dx = s.x - f.x;
            const dy = s.y - f.y;
            if (dx * dx + dy * dy <= threshold * threshold) {
              hit = true;
              break;
            }
          }
          if (!hit && sticky) {
            hit = distPointToSegment(f.x, f.y, base.x, base.y, tip.x, tip.y) <= threshold + 14;
          }

          if (hit) {
            caughtAny = true;
            if (sticky) {
              caughtRefs.add(f);
              caughtOrdered.push(f);
            } else {
              const row = collectTongueRow(f, base, tip);
              for (const chainedFly of row) {
                if (caughtRefs.has(chainedFly)) continue;
                caughtRefs.add(chainedFly);
                caughtOrdered.push(chainedFly);
              }
              break;
            }
          }
        }

        if (caughtOrdered.length > 0) {
          tongue.caughtFlies.push(...caughtOrdered);
          state.flies = state.flies.filter((fly) => !caughtRefs.has(fly));
          if (caughtOrdered.length > 1) {
            const rowLabel = caughtOrdered[0].id === 'letter'
              ? `LETTER ${caughtOrdered[0].letter}`
              : caughtOrdered[0].def.name.toUpperCase();
            addFloatText(tip.x, tip.y - 26, isHindi() ? `${rowLabel} लाइन x${caughtOrdered.length} · धूम!` : `${rowLabel} ROW x${caughtOrdered.length}`, '#dfffd0');
          }
        }

        let rivalHit = false;
        for (const rv of activeRivals()) {
          if (rv.hitCooldown > 0 || rv.health <= 0) continue;
          const hitRadius = 40 + (sticky ? 20 : 0);
          let hit = false;
          for (const s of samples) {
            const dx = s.x - rv.x;
            const dy = s.y - rv.y;
            if (dx * dx + dy * dy <= hitRadius * hitRadius) {
              hit = true;
              break;
            }
          }
          if (!hit) {
            hit = distPointToSegment(rv.x, rv.y, base.x, base.y, tip.x, tip.y) <= hitRadius + (sticky ? 12 : 8);
          }
          if (hit) {
            hitRivalWithTongue(rv, sticky ? 20 : 14);
            rivalHit = true;
            if (!sticky) break;
          }
        }

        if ((caughtAny || rivalHit) && !sticky) {
          tongue.state = 'IN';
          tongue.retractSpeed = 240;
        }

        if (tongue.length >= tongue.maxLength) {
          tongue.state = 'IN';
          tongue.retractSpeed = 220;
        }
      } else if (tongue.state === 'IN') {
        tongue.retractSpeed += 320 * dt;
        tongue.length -= tongue.retractSpeed * dt;

        if (tongue.length <= 0) {
          tongue.length = 0;
          tongue.state = 'IDLE';
          if (tongue.caughtFlies.length > 0) {
            const catches = [...tongue.caughtFlies];
            tongue.caughtFlies = [];
            for (const c of catches) {
              onCatch(c, frogX(), frogY() + 16);
              spawnBurst(frogX(), frogY() + 14, c.color, 9, 0.35);
            }
          } else {
            state.comboTimer = Math.max(0, state.comboTimer - 0.8);
            if (state.comboTimer <= 0) {
              state.combo = 1;
              state.comboChain = 0;
            }
            updateHud();
          }
        }
      }
    }

    function updateEffects(dt) {
      if (state.effects.glow > 0) state.effects.glow -= dt;
      if (state.effects.drunk > 0) state.effects.drunk -= dt;
      if (state.effects.spiral > 0) state.effects.spiral -= dt;
      if (state.effects.nightVision > 0) state.effects.nightVision = Math.max(0, state.effects.nightVision - dt);
      if (state.effects.loveJump > 0) state.effects.loveJump = Math.max(0, state.effects.loveJump - dt);
      if (state.effects.loveRain > 0) {
        state.effects.loveRain = Math.max(0, state.effects.loveRain - dt);
        if (Math.random() < 14 * dt) {
          const p = new Particle(40 + Math.random() * (state.width - 80), -20 - Math.random() * 80, Math.random() < 0.5 ? '#ff93ca' : '#ffd8ec', '<3', 1.1 + Math.random() * 0.8);
          p.vx = (Math.random() - 0.5) * 16;
          p.vy = 82 + Math.random() * 58;
          state.particles.push(p);
        }
      }
      if (state.effects.hopeHalo > 0) {
        state.effects.hopeHalo = Math.max(0, state.effects.hopeHalo - dt);
        if (state.health.frog < state.health.maxFrog) {
          state.health.frog = Math.min(state.health.maxFrog, state.health.frog + 8 * dt);
          state.lives = Math.max(0, Math.ceil(state.health.frog / 20));
        }
      }
      if (state.effects.hopeGiant > 0) state.effects.hopeGiant = Math.max(0, state.effects.hopeGiant - dt);
      if (state.medAim.timer > 0) {
        state.medAim.timer = Math.max(0, state.medAim.timer - dt);
        if (state.medAim.timer <= 0) state.medAim.active = false;
      }
      if (state.effects.timeFreeze > 0) {
        state.effects.timeFreeze -= dt;
        if (state.effects.timeFreeze < 0) state.effects.timeFreeze = 0;
      }
      if (state.directionalSight.timer > 0) {
        state.directionalSight.timer = Math.max(0, state.directionalSight.timer - dt);
        if (state.directionalSight.timer <= 0) {
          state.directionalSight.armed = false;
        }
      }
      if (state.effects.nightVision <= 0) state.directionalSight.armed = false;
      if (state.effects.medicinal > 0) {
        state.effects.medicinal -= dt;
        if (state.health.frog < state.health.maxFrog) {
          state.health.frog = Math.min(state.health.maxFrog, state.health.frog + 10 * dt);
          state.lives = Math.max(0, Math.ceil(state.health.frog / 20));
        }
        if (state.effects.medicinal <= 0) {
          state.effects.medicinal = 0;
        }
      }

      if (state.shakeTimer > 0) {
        state.shakeTimer -= dt;
        if (state.shakeTimer <= 0) {
          state.shakeTimer = 0;
          state.shakePower = 0;
        }
      }

      if (state.levelIntroTimer > 0) {
        state.levelIntroTimer -= dt;
        if (state.levelIntroTimer <= 0) state.levelIntroTimer = 0;
      }

      if (state.level === 7 && state.quest.active && state.mode === MODE.PLAYING) {
        state.quest.timer = Math.max(0, state.quest.timer - dt);
      }
    }

    function update(dt) {
      state.frame += 1;

      updateBackground(dt);
      updateWeather(dt);
      updateEffects(dt);
      updateFrogMotion(dt);

      for (const p of state.particles) p.update(dt);
      state.particles = state.particles.filter((p) => p.life > 0);

      for (const t of state.floatTexts) {
        t.y += t.vy * dt;
        t.life -= dt;
      }
      state.floatTexts = state.floatTexts.filter((t) => t.life > 0);

      if (state.mode === MODE.WIN) {
        state.ending.timer += dt;
        state.ending.leftCatchTimer = Math.max(0, state.ending.leftCatchTimer - dt);
        state.ending.rightCatchTimer = Math.max(0, state.ending.rightCatchTimer - dt);
        const starryBlend = getEndingStarryBlend();
        const bases = getEndingTongueBases();
        const tongueConfigs = [
          { obj: state.ending.leftTongue, baseX: bases.leftX, baseY: bases.leftY, facing: 0, side: 'left' },
          { obj: state.ending.rightTongue, baseX: bases.rightX, baseY: bases.rightY, facing: Math.PI, side: 'right' }
        ];

        for (const cfg of tongueConfigs) {
          cfg.obj.retarget -= dt;
          if (cfg.obj.retarget <= 0) {
            cfg.obj.retarget = 0.32 + Math.random() * 0.54;
            const preferForward = Math.random() < 0.76;
            if (preferForward) {
              cfg.obj.aimAngle = cfg.facing + (Math.random() - 0.5) * 1.8;
            } else {
              cfg.obj.aimAngle = Math.random() * Math.PI * 2;
            }
            cfg.obj.aimLen = 34 + Math.random() * 116;
          }
          const calmAngle = cfg.facing === 0 ? 0.08 : Math.PI - 0.08;
          const calmLen = 28;
          cfg.obj.aimAngle = lerpAngle(cfg.obj.aimAngle, calmAngle, 0.18 * starryBlend);
          cfg.obj.aimLen += (calmLen - cfg.obj.aimLen) * 0.16 * starryBlend;
          cfg.obj.angle = lerpAngle(cfg.obj.angle, cfg.obj.aimAngle, 0.2);
          cfg.obj.len += (cfg.obj.aimLen - cfg.obj.len) * 0.18;
          cfg.obj.len = clamp(cfg.obj.len, 24, 154);
        }

        const leftTip = getEndingTongueTip(state.ending.leftTongue, bases.leftX, bases.leftY);
        const rightTip = getEndingTongueTip(state.ending.rightTongue, bases.rightX, bases.rightY);

        // Keep ending catches calm: only one active target per frog at a time.
        let leftBusy = false;
        let rightBusy = false;
        for (const h of state.ending.hearts) {
          if (h.target === 'left') {
            if (leftBusy) h.target = '';
            else leftBusy = true;
          } else if (h.target === 'right') {
            if (rightBusy) h.target = '';
            else rightBusy = true;
          }
        }

        for (const h of state.ending.hearts) {
          if (!h.target) {
            const roll = Math.random();
            if (!leftBusy && roll < 0.005 * (1 - starryBlend)) {
              h.target = 'left';
              leftBusy = true;
            } else if (!rightBusy && roll > 1 - 0.005 * (1 - starryBlend)) {
              h.target = 'right';
              rightBusy = true;
            }
          }

          if (h.target) {
            if (starryBlend > 0.68 && Math.random() < 0.12 * starryBlend) {
              h.target = '';
            }
            const tx = h.target === 'left' ? leftTip.x : rightTip.x;
            const ty = h.target === 'left' ? leftTip.y : rightTip.y;
            const dx = tx - h.x;
            const dy = ty - h.y;
            const dist = Math.max(1, Math.hypot(dx, dy));
            const speed = (85 + Math.min(120, dist * 0.45)) * (1 - starryBlend * 0.82);
            h.x += (dx / dist) * speed * dt;
            h.y += (dy / dist) * speed * dt;
          } else {
            h.y += h.vy * dt * (1 - starryBlend * 0.82);
            h.x += h.drift * dt * (1 - starryBlend * 0.45);
            h.x += Math.sin(state.ending.timer * 0.7 + h.drift) * 7 * dt * starryBlend;
          }

          const leftLineDist = distPointToSegment(h.x, h.y, bases.leftX, bases.leftY, leftTip.x, leftTip.y);
          const rightLineDist = distPointToSegment(h.x, h.y, bases.rightX, bases.rightY, rightTip.x, rightTip.y);
          const leftTipDist = Math.hypot(h.x - leftTip.x, h.y - leftTip.y);
          const rightTipDist = Math.hypot(h.x - rightTip.x, h.y - rightTip.y);

          if (starryBlend < 0.45 && (leftLineDist < 8 || leftTipDist < 10)) {
            state.ending.leftCatchTimer = 0.34;
            h.x = Math.random() * state.width;
            h.y = -22 - Math.random() * state.height * 0.5;
            h.target = '';
            leftBusy = false;
          } else if (starryBlend < 0.45 && (rightLineDist < 8 || rightTipDist < 10)) {
            state.ending.rightCatchTimer = 0.34;
            h.x = Math.random() * state.width;
            h.y = -22 - Math.random() * state.height * 0.5;
            h.target = '';
            rightBusy = false;
          }

          if (h.y > state.height + 20) {
            h.y = -20;
            h.x = Math.random() * state.width;
            h.target = '';
          }
          if (h.x < -20) h.x = state.width + 20;
          if (h.x > state.width + 20) h.x = -20;
        }
        return;
      }

      if (state.mode === MODE.START || state.mode === MODE.GAME_OVER || state.mode === MODE.PAUSED) {
        return;
      }

      if (state.mode === MODE.LEVEL_UP) {
        state.levelPauseTimer -= dt;
        if (state.levelPauseTimer <= 0) {
          setLevel(state.level + 1);
          state.mode = MODE.PLAYING;
          updateHud();
        }
        return;
      }

      updateAIDirector(dt);

      const frozen = state.effects.timeFreeze > 0;
      if (!frozen) {
        maybeSpawnFly(dt);
        for (const fly of state.flies) fly.update(dt);
        updateRivals(dt);
        updateFinalChallenge(dt);
      }
      updateSweep(dt);
      updateTongue(dt);

      if (state.comboTimer > 0) {
        state.comboTimer -= dt;
        if (state.comboTimer <= 0) {
          state.comboTimer = 0;
          state.combo = 1;
          state.comboChain = 0;
          updateHud();
        }
      }

      if (levelReadyToAdvance()) {
        triggerLevelAdvance();
      }

      updateHud();
    }

    function drawBackground() {
      const env = state.currentEnv;
      const gradient = ctx.createLinearGradient(0, 0, 0, state.height);
      gradient.addColorStop(0, env.bgA);
      gradient.addColorStop(1, env.bgB);
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, state.width, state.height);

      ctx.fillStyle = env.fg;
      ctx.font = '15px "Courier Prime", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for (const p of state.bgPattern) {
        ctx.fillText(env.char, p.x, p.y);
      }

      ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
      for (let y = 0; y < state.height; y += 4) {
        ctx.fillRect(0, y, state.width, 1);
      }

      drawPatternCues();

      if (state.weather.particles.length > 0) {
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        if (state.weather.rain) {
          ctx.fillStyle = 'rgba(150,190,255,0.55)';
          ctx.font = '14px "Courier Prime", monospace';
          for (const p of state.weather.particles) {
            ctx.fillText('/', p.x, p.y);
          }
        } else if (state.weather.snow) {
          ctx.fillStyle = 'rgba(230,245,255,0.8)';
          ctx.font = '14px "Courier Prime", monospace';
          for (const p of state.weather.particles) {
            ctx.fillText((Math.floor((p.x + p.y) * 0.03) % 2 === 0) ? '*' : '.', p.x, p.y);
          }
        } else if (state.weather.highWind) {
          ctx.fillStyle = 'rgba(190,225,210,0.5)';
          ctx.font = '13px "Courier Prime", monospace';
          for (const p of state.weather.particles) {
            ctx.fillText('-', p.x, p.y);
          }
        }
      }

      if (state.weather.lightningTimer > 0) {
        const a = clamp(state.weather.lightningTimer / 0.22, 0, 1);
        ctx.fillStyle = `rgba(240,248,255,${0.11 + a * 0.24})`;
        ctx.fillRect(0, 0, state.width, state.height);
        const lx = state.weather.lightningX;
        let y = 0;
        ctx.fillStyle = `rgba(255,255,255,${0.55 + a * 0.35})`;
        ctx.font = '18px "Courier Prime", monospace';
        for (let i = 0; i < 12; i++) {
          const jx = (Math.random() - 0.5) * 28;
          const jy = 24 + Math.random() * 26;
          y += jy;
          ctx.fillText('|', lx + jx, y);
          if (Math.random() < 0.45) ctx.fillText('/', lx + jx - 8, y + 7);
        }
      }

      if (state.weather.darkness > 0.01) {
        ctx.fillStyle = `rgba(1, 2, 6, ${clamp(state.weather.darkness * 1.18, 0, 0.82)})`;
        ctx.fillRect(0, 0, state.width, state.height);
        if (state.directionalSight.timer > 0 && state.effects.nightVision > 0) {
          const originX = frogX();
          const originY = frogY() - 10;
          const dir = getDirectionUnit(state.directionalSight.dir || state.frog.facing || 'RIGHT');
          const angle = Math.atan2(dir.y, dir.x);
          const spread = 0.38;
          const range = 340;
          const reveal = clamp(state.directionalSight.timer / 0.86, 0, 1);
          ctx.save();
          ctx.globalCompositeOperation = 'destination-out';
          const cone = ctx.createRadialGradient(originX, originY, 12, originX + dir.x * range * 0.62, originY + dir.y * range * 0.62, range);
          cone.addColorStop(0, `rgba(0,0,0,${0.62 * reveal})`);
          cone.addColorStop(0.72, `rgba(0,0,0,${0.22 * reveal})`);
          cone.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = cone;
          ctx.beginPath();
          ctx.moveTo(originX, originY);
          ctx.arc(originX, originY, range, angle - spread, angle + spread);
          ctx.closePath();
          ctx.fill();
          ctx.beginPath();
          ctx.arc(originX, originY, 62, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(0,0,0,${0.16 * reveal})`;
          ctx.fill();
          ctx.restore();
          ctx.save();
          ctx.globalCompositeOperation = 'screen';
          const torch = ctx.createRadialGradient(originX, originY, 12, originX + dir.x * range * 0.5, originY + dir.y * range * 0.5, range);
          torch.addColorStop(0, `rgba(255, 242, 156, ${0.22 * reveal})`);
          torch.addColorStop(0.38, `rgba(255, 232, 112, ${0.17 * reveal})`);
          torch.addColorStop(0.82, `rgba(255, 215, 90, ${0.08 * reveal})`);
          torch.addColorStop(1, 'rgba(255, 210, 80, 0)');
          ctx.fillStyle = torch;
          ctx.beginPath();
          ctx.moveTo(originX, originY);
          ctx.arc(originX, originY, range, angle - spread, angle + spread);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }
      }
    }

    function drawPatternCues() {
      const level = state.level;
      const phase = state.frame * 0.04;
      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      if (level === 1) {
        ctx.font = '14px "Courier Prime", monospace';
        const leftHot = Math.sin(phase * 1.8) > 0;
        for (let y = 120; y < state.height - 80; y += 56) {
          ctx.fillStyle = leftHot ? 'rgba(140,255,170,0.22)' : 'rgba(140,255,170,0.08)';
          ctx.fillText('|~|', state.width * 0.22, y);
          ctx.fillStyle = !leftHot ? 'rgba(140,255,170,0.22)' : 'rgba(140,255,170,0.08)';
          ctx.fillText('|~|', state.width * 0.78, y + 20);
        }
      } else if (level === 2) {
        ctx.font = '13px "Courier Prime", monospace';
        for (let r = 80; r < 280; r += 44) {
          const pulse = 0.08 + Math.max(0, Math.sin(phase * 2.4 - r * 0.02)) * 0.18;
          ctx.fillStyle = `rgba(152,214,255,${pulse})`;
          for (let a = 0; a < Math.PI * 2; a += Math.PI / 8) {
            ctx.fillText('~', state.cx + Math.cos(a) * r, state.cy + Math.sin(a) * r * 0.48);
          }
        }
      } else if (level === 3) {
        ctx.font = '14px "Courier Prime", monospace';
        ctx.fillStyle = 'rgba(155,235,255,0.18)';
        for (let x = -80; x < state.width + 80; x += 120) {
          for (let y = 80; y < state.height - 40; y += 64) {
            ctx.fillText('///', x + (y % 128) * 0.3, y);
          }
        }
      } else if (level === 4) {
        ctx.font = '14px "Courier Prime", monospace';
        for (let x = state.width * 0.24; x <= state.width * 0.76; x += 118) {
          for (let y = 120; y <= state.height - 120; y += 96) {
            const hot = Math.abs(x - state.cx) < 70 && y > state.cy - 40 && y < state.cy + 140;
            ctx.fillStyle = hot ? 'rgba(255,196,132,0.12)' : 'rgba(150,255,182,0.12)';
            ctx.fillText(hot ? '+ +' : ': :', x, y);
            ctx.fillText(hot ? '--' : '..', x, y + 16);
          }
        }
      } else if (level === 5) {
        ctx.font = '13px "Courier Prime", monospace';
        const seq = ['1', '2', '3', '4'];
        const y = 112;
        for (let i = 0; i < seq.length; i++) {
          const active = Math.floor(phase * 2.3) % seq.length === i;
          ctx.fillStyle = active ? 'rgba(255,248,155,0.32)' : 'rgba(255,248,155,0.10)';
          ctx.fillText(`[${seq[i]}]`, state.width * 0.24 + i * state.width * 0.16, y + (i % 2) * 24);
        }
      } else if (level === 6) {
        ctx.font = '14px "Courier Prime", monospace';
        for (let y = 120; y < state.height - 60; y += 54) {
          const drift = 0.07 + ((y / state.height) * 0.12);
          ctx.fillStyle = `rgba(120,210,255,${drift})`;
          for (let x = 48; x < state.width; x += 96) {
            ctx.fillText('~~~~', x + Math.sin(phase + y * 0.02) * 18, y);
          }
        }
      } else if (level === 7) {
        ctx.font = '14px "Courier Prime", monospace';
        ctx.fillStyle = 'rgba(155,255,155,0.12)';
        for (let y = 104; y < state.height - 70; y += 60) {
          ctx.fillText('/|\\', state.width * 0.25, y);
          ctx.fillText('/|\\', state.width * 0.75, y);
        }
        ctx.fillStyle = 'rgba(255,225,128,0.16)';
        ctx.fillText('/~\\', state.width * 0.61, state.cy - 64);
      } else if (level === 8) {
        ctx.fillStyle = 'rgba(230,240,255,0.08)';
        for (let i = 0; i < 3; i++) {
          const w = 140;
          const x = state.width * (0.24 + i * 0.22);
          const reveal = (Math.floor(phase * 1.2) + i) % 4 < 2;
          ctx.fillRect(x - w / 2, 112 + i * 54, w, 34);
          if (reveal) {
            ctx.fillStyle = 'rgba(255,244,166,0.22)';
            ctx.font = '13px "Courier Prime", monospace';
            ctx.fillText(`[${i + 1}]`, x, 128 + i * 54);
            ctx.fillStyle = 'rgba(230,240,255,0.08)';
          }
        }
      } else if (level === 9) {
        ctx.font = '13px "Courier Prime", monospace';
        ctx.fillStyle = 'rgba(135,225,255,0.14)';
        for (let x = 56; x < state.width; x += 118) {
          ctx.fillText('///', x, 122 + Math.sin(phase + x * 0.01) * 20);
        }
        ctx.fillStyle = 'rgba(255,238,140,0.16)';
        for (let r = 90; r < 220; r += 54) {
          for (let a = 0; a < Math.PI * 2; a += Math.PI / 6) {
            ctx.fillText('.', state.cx + Math.cos(a + phase * 0.5) * r, state.cy + Math.sin(a + phase * 0.5) * r * 0.44);
          }
        }
      } else if (level === 10) {
        ctx.font = '14px "Courier Prime", monospace';
        for (let y = 110; y < state.height - 90; y += 62) {
          ctx.fillStyle = 'rgba(175,255,175,0.14)';
          ctx.fillText('<|>', state.width * 0.28, y);
          ctx.fillText('<|>', state.width * 0.72, y);
        }
        ctx.fillStyle = 'rgba(255,120,120,0.16)';
        ctx.fillText('<!>', state.width * (Math.sin(phase * 0.9) > 0 ? 0.41 : 0.59), state.cy - 72);
      } else if (level === 11) {
        ctx.font = '13px "Courier Prime", monospace';
        ctx.fillStyle = 'rgba(120,185,255,0.16)';
        for (let y = 110; y < state.height - 90; y += 54) ctx.fillText('[BLUE]', 92, y);
        ctx.fillStyle = 'rgba(255,232,140,0.16)';
        for (let x = state.width * 0.32; x < state.width - 80; x += 116) ctx.fillText('$$$', x, 104 + Math.sin(phase + x * 0.01) * 16);
      } else if (level === 12) {
        ctx.font = '14px "Courier Prime", monospace';
        ctx.fillStyle = 'rgba(255,190,120,0.15)';
        for (let y = 96; y < state.height - 60; y += 50) {
          ctx.fillText('>>', state.width * 0.2, y);
          ctx.fillText('<<', state.width * 0.8, y + 14);
        }
        ctx.fillStyle = 'rgba(195,235,255,0.12)';
        for (let x = state.width * 0.3; x < state.width * 0.72; x += 92) {
          ctx.fillText('|', x, state.cy - 160);
          ctx.fillText('|', x, state.cy + 160);
        }
      }

      ctx.restore();
    }

    function drawMedicinalAimLine() {
      if (!state.medAim.active || state.medAim.timer <= 0) return;
      ctx.save();
      ctx.font = '12px "Courier Prime", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const dx = state.medAim.toX - state.medAim.fromX;
      const dy = state.medAim.toY - state.medAim.fromY;
      const dist = Math.max(1, Math.hypot(dx, dy));
      const steps = Math.max(4, Math.floor(dist / 15));
      ctx.fillStyle = '#dfffd0';
      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        ctx.fillText('.', state.medAim.fromX + dx * t, state.medAim.fromY + dy * t);
      }
      ctx.restore();
    }

    function drawSweepEffect() {

    function drawEndingStarryBackdrop(alpha = 1) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = 'rgba(8, 20, 56, 0.82)';
      ctx.fillRect(0, 0, state.width, state.height);

      const palette = ['#5f8dff', '#79c8ff', '#ffd96f', '#fff3b2', '#9d7bff', '#68b7ff'];
      const swirls = [
        { x: state.width * 0.26, y: state.height * 0.24, radius: 22, turn: 0.42, stretchX: 1.18, stretchY: 0.76 },
        { x: state.width * 0.69, y: state.height * 0.2, radius: 30, turn: -0.38, stretchX: 1.26, stretchY: 0.82 },
        { x: state.width * 0.52, y: state.height * 0.34, radius: 18, turn: 0.34, stretchX: 1.45, stretchY: 0.58 },
        { x: state.width * 0.15, y: state.height * 0.62, radius: 16, turn: 0.3, stretchX: 1.7, stretchY: 0.64 },
        { x: state.width * 0.84, y: state.height * 0.58, radius: 18, turn: -0.27, stretchX: 1.62, stretchY: 0.7 },
        { x: state.width * 0.48, y: state.height * 0.8, radius: 22, turn: 0.22, stretchX: 2.2, stretchY: 0.42 }
      ];
      const flowBands = [
        { y: state.height * 0.15, amp: 30, speed: 0.55, spacing: 20, slope: 0.018, width: 2.4, charA: '.', charB: 'o' },
        { y: state.height * 0.26, amp: 42, speed: -0.42, spacing: 18, slope: -0.014, width: 2.8, charA: 'o', charB: '*' },
        { y: state.height * 0.4, amp: 54, speed: 0.48, spacing: 20, slope: 0.011, width: 3.4, charA: '.', charB: '*' },
        { y: state.height * 0.57, amp: 46, speed: -0.34, spacing: 22, slope: -0.012, width: 3.2, charA: 'o', charB: '.' },
        { y: state.height * 0.74, amp: 34, speed: 0.28, spacing: 24, slope: 0.01, width: 2.6, charA: '.', charB: 'o' }
      ];

      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = '700 14px "Courier Prime", monospace';

      for (let i = 0; i < flowBands.length; i++) {
        const band = flowBands[i];
        for (let x = -120; x < state.width + 140; x += band.spacing) {
          const curve = Math.sin(x * 0.01 + state.ending.timer * band.speed + i * 0.7) * band.amp;
          const sweep = Math.cos(x * 0.006 - state.ending.timer * (band.speed * 0.7) + i * 1.3) * (band.amp * 0.34);
          const baseY = band.y + curve + sweep;
          for (let lane = -1; lane <= 1; lane++) {
            const fx = x + lane * 10;
            const fy = baseY + lane * band.width * 8 + Math.sin(fx * band.slope + state.ending.timer * 0.7) * 8;
            const waveChar = (Math.floor((x + state.frame * 2 + lane * 9) / 26) % 4 === 0) ? band.charB : band.charA;
            const color = palette[(i + lane + Math.floor((x + state.frame) / 48) + palette.length * 4) % palette.length];
            ctx.globalAlpha = alpha * (0.09 + (lane === 0 ? 0.24 : 0.12));
            ctx.fillStyle = color;
            ctx.fillText(waveChar, fx, fy);
          }
        }
      }

      ctx.font = '700 13px "Courier Prime", monospace';
      for (let y = 18; y < state.height; y += 26) {
        for (let x = 12; x < state.width; x += 34) {
          const drift = Math.sin(x * 0.009 + y * 0.01 + state.ending.timer * 0.82) + Math.cos(y * 0.014 - state.ending.timer * 0.47);
          if (Math.abs(drift) < 1.08) continue;
          const color = palette[(Math.floor(x / 90) + Math.floor(y / 70) + Math.floor(state.frame / 12)) % palette.length];
          ctx.globalAlpha = alpha * (0.08 + Math.abs(drift) * 0.07);
          ctx.fillStyle = color;
          ctx.fillText(drift > 1.55 ? '*' : 'o', x + Math.sin(y * 0.03 + state.ending.timer * 0.6) * 10, y + Math.cos(x * 0.014 - state.ending.timer * 0.5) * 6);
        }
      }

      for (let i = 0; i < swirls.length; i++) {
        const swirl = swirls[i];
        for (let step = 0; step < 42; step++) {
          const a = state.ending.timer * swirl.turn + step * 0.34;
          const r = swirl.radius + step * 3.8;
          const x = swirl.x + Math.cos(a) * r * swirl.stretchX;
          const y = swirl.y + Math.sin(a) * r * swirl.stretchY;
          const char = step % 7 === 0 ? '*' : (step % 3 === 0 ? 'o' : '.');
          const color = palette[(i * 2 + step + Math.floor(state.frame / 8)) % palette.length];
          ctx.globalAlpha = alpha * (0.18 + (step / 42) * 0.36);
          ctx.fillStyle = color;
          ctx.fillText(char, x, y);
        }
      }

      ctx.globalAlpha = alpha * 0.9;
      ctx.fillStyle = '#ffe590';
      ctx.font = '700 18px "Courier Prime", monospace';
      for (let ring = 0; ring < 4; ring++) {
        for (let a = 0; a < Math.PI * 2; a += Math.PI / 7) {
          const r = 16 + ring * 10;
          ctx.fillText(ring === 0 ? '@' : '*', state.width * 0.76 + Math.cos(a + state.ending.timer * 0.16) * r, state.height * 0.22 + Math.sin(a + state.ending.timer * 0.16) * r * 0.76);
        }
      }

      ctx.globalAlpha = alpha * 0.32;
      ctx.fillStyle = '#7ae0ff';
      ctx.font = '700 13px "Courier Prime", monospace';
      for (let band = 0; band < 6; band++) {
        const baseY = state.height * (0.12 + band * 0.14);
        for (let x = -60; x < state.width + 100; x += 24) {
          const y = baseY + Math.sin(x * 0.012 + state.ending.timer * (0.58 + band * 0.06) + band) * (10 + band * 4)
            + Math.cos(x * 0.004 - state.ending.timer * 0.24 + band) * (5 + band * 2);
          ctx.fillText(band % 2 === 0 ? '~' : '-', x, y);
        }
      }

      ctx.globalAlpha = alpha * 0.24;
      ctx.fillStyle = '#1b4d56';
      for (let y = state.height * 0.34; y < state.height * 0.78; y += 18) {
        const sway = Math.sin(state.ending.timer * 0.9 + y * 0.03) * 10;
        ctx.fillText('/|\\', state.width * 0.13 + sway, y);
        ctx.fillText('/|\\', state.width * 0.9 + sway * 0.7, y + 8);
      }

      ctx.globalAlpha = 1;
      ctx.restore();
    }

      ];

    function drawPixelGlyphRows(rows, startX, startY, pixelSize, gap, color, shadowColor, alpha = 1) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = color;
      ctx.shadowColor = shadowColor || color;
      ctx.shadowBlur = Math.max(0, pixelSize * 0.8);
      for (let y = 0; y < rows.length; y++) {
        const row = rows[y];
        for (let x = 0; x < row.length; x++) {
          if (row[x] !== '1') continue;
          ctx.fillRect(startX + x * (pixelSize + gap), startY + y * (pixelSize + gap), pixelSize, pixelSize);
        }
      }
      ctx.restore();
    }

    function drawPixelCelebrationTitle(text, centerX, topY, alpha = 1) {
      const font = {
        A: ['01110','10001','10001','11111','10001','10001','10001'],
        C: ['01111','10000','10000','10000','10000','10000','01111'],
        G: ['01111','10000','10000','10111','10001','10001','01110'],
        I: ['11111','00100','00100','00100','00100','00100','11111'],
        L: ['10000','10000','10000','10000','10000','10000','11111'],
        N: ['10001','11001','10101','10011','10001','10001','10001'],
        O: ['01110','10001','10001','10001','10001','10001','01110'],
        R: ['11110','10001','10001','11110','10100','10010','10001'],
        S: ['01111','10000','10000','01110','00001','00001','11110'],
        T: ['11111','00100','00100','00100','00100','00100','00100'],
        U: ['10001','10001','10001','10001','10001','10001','01110'],
        '!': ['00100','00100','00100','00100','00100','00000','00100']
      };
      const letters = text.split('');
      const glyphWidth = 5;
      const glyphHeight = 7;
      const pixelSize = Math.max(6, Math.min(11, Math.floor(state.width / 120)));
      const gap = 1;
      const letterGap = pixelSize + 3;
      const spaceGap = pixelSize * 3;
      let totalWidth = 0;
      for (const ch of letters) {
        totalWidth += ch === ' ' ? spaceGap : (glyphWidth * (pixelSize + gap) - gap + letterGap);
      }
      totalWidth = Math.max(0, totalWidth - letterGap);
      let x = centerX - totalWidth / 2;
      for (const ch of letters) {
        if (ch === ' ') {
          x += spaceGap;
          continue;
        }
        const rows = font[ch] || font.A;
        drawPixelGlyphRows(rows, x, topY, pixelSize, gap, '#fff2a0', '#ffcf66', alpha);
        const inset = Math.max(1, Math.floor(pixelSize * 0.18));
        const inner = Math.max(2, Math.floor(pixelSize * 0.46));
        drawPixelGlyphRows(rows, x + inset, topY + inset, inner, gap, '#fff9de', '#fff2a0', alpha * 0.95);
        x += glyphWidth * (pixelSize + gap) - gap + letterGap;
      }
      return glyphHeight * (pixelSize + gap) - gap;
    }

    function drawCelebrationFireworks(alpha = 1) {
      const bursts = [
        { x: 0.18, y: 0.19, hue: '#ffcf6a', speed: 1.05, size: 1.0 },
        { x: 0.34, y: 0.11, hue: '#9aeaff', speed: 1.28, size: 0.9 },
        { x: 0.56, y: 0.18, hue: '#ff9fe2', speed: 1.16, size: 1.15 },
        { x: 0.76, y: 0.14, hue: '#fff1a0', speed: 1.34, size: 1.05 },
        { x: 0.86, y: 0.24, hue: '#95dfff', speed: 1.08, size: 0.92 }
      ];
      ctx.save();
      ctx.globalAlpha = alpha;
      for (let i = 0; i < bursts.length; i++) {
        const burst = bursts[i];
        const cycle = (state.ending.timer * burst.speed + i * 0.31) % 1.55;
        const phase = cycle / 1.55;
        const cx = state.width * burst.x;
        const cy = state.height * burst.y;
        const radius = (28 + phase * 78) * burst.size;
        const spokes = 12 + (i % 3) * 2;
        for (let s = 0; s < spokes; s++) {
          const angle = (Math.PI * 2 * s) / spokes + phase * 0.26;
          const px = cx + Math.cos(angle) * radius;
          const py = cy + Math.sin(angle) * radius * 0.82;
          const sparkSize = 3 + ((s + i) % 2);
          ctx.fillStyle = burst.hue;
          ctx.shadowColor = burst.hue;
          ctx.shadowBlur = 12;
          ctx.fillRect(px - sparkSize / 2, py - sparkSize / 2, sparkSize, sparkSize);
          if (phase < 0.72) {
            const mid = radius * 0.56;
            const mx = cx + Math.cos(angle) * mid;
            const my = cy + Math.sin(angle) * mid * 0.82;
            ctx.globalAlpha = alpha * (0.18 + (1 - phase) * 0.36);
            ctx.fillRect(mx - 1, my - 1, 2, 2);
            ctx.globalAlpha = alpha;
          }
        }
        ctx.fillStyle = '#fff9dd';
        ctx.shadowColor = '#fff5c0';
        ctx.shadowBlur = 18;
        ctx.fillRect(cx - 3, cy - 3, 6, 6);
      }
      ctx.restore();
    }

    function drawEndingCelebration() {

    function drawFrog() {
      ctx.save();
      ctx.globalAlpha = getVisibilityFactor('frog');
      if (state.effects.drunk > 0) {
        ctx.shadowBlur = 26;
        ctx.shadowColor = `hsl(${(state.frame * 9) % 360} 100% 70%)`;
      } else if (state.effects.glow > 0) {
        ctx.shadowBlur = 24;
        ctx.shadowColor = '#d6ff8a';
      }

      ctx.fillStyle = state.currentEnv.frogColor;
      ctx.font = '700 20px "Courier Prime", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      const blink = Math.sin(state.frame * 0.04) > 0.96;
      const mouthOpen = state.tongue.state !== 'IDLE';
      const nightEyes = state.effects.nightVision > 0;

      let eyeLine = `  (${blink ? '-' : 'o'}) (${blink ? '-' : 'o'})  `;
      if (state.effects.drunk > 0) {
        eyeLine = ' ((o)) ((o)) ';
      } else if (nightEyes) {
        eyeLine = '               ';
      }

      const mouthClosed = state.effects.spiral > 0 ? '>(@@)< ' : '>___< ';
      const mouthOpenText = state.effects.spiral > 0 ? '>@@@< ' : '>OOO< ';
      const airborne = state.frog.jumpZ > 1;
      const groundX = state.cx + state.frog.ox;
      const groundY = state.cy + state.frog.oy;
      const fx = groundX;
      const fy = groundY - state.frog.jumpZ;
      const shadowAlpha = clamp(0.22 - state.frog.jumpZ / 520, 0.06, 0.2);
      const shadowScale = clamp(1 - state.frog.jumpZ / 240, 0.45, 1);

      ctx.save();
      ctx.shadowBlur = 0;
      ctx.fillStyle = `rgba(0, 0, 0, ${shadowAlpha})`;
      ctx.font = '700 18px "Courier Prime", monospace';
      ctx.fillText('_'.repeat(Math.max(3, Math.round(7 * shadowScale))), groundX, groundY + 34);
      ctx.restore();

      const frogClosed = [
        '   _   _   ',
        eyeLine,
        ' /       \\ ',
        `/( ${mouthClosed})\\`,
        '  ^^   ^^  '
      ];

      const frogOpen = [
        '   _   _   ',
        eyeLine,
        ' /       \\ ',
        `/( ${mouthOpenText})\\`,
        '  ^^   ^^  '
      ];

      const frogJump = [
        '   _   _   ',
        eyeLine,
        ' /  ___  \\ ',
        `/( ${mouthOpen ? mouthOpenText : mouthClosed})\\`,
        ' _/\\   /\\_ '
      ];

      const art = airborne ? frogJump : (mouthOpen ? frogOpen : frogClosed);
      const bob = airborne ? 0 : Math.sin(state.frame * 0.09) * 2;
      const jumpStretch = clamp(state.frog.jumpZ / 220, 0, 0.18);
      const landSquash = state.frog.landSquash;
      const giant = state.effects.hopeGiant > 0 ? 1 + 0.38 * clamp(state.effects.hopeGiant / 10.5, 0.35, 1) : 1;
      const scaleX = (1 - jumpStretch * 0.12 + landSquash * 0.18) * giant;
      const scaleY = (1 + jumpStretch * 0.1 - landSquash * 0.12) * giant;
      ctx.translate(fx, fy + bob);
      ctx.scale(scaleX, scaleY);
      for (let i = 0; i < art.length; i++) {
        ctx.fillText(art[i], 0, -42 + i * 19);
      }
      if (nightEyes) {
        ctx.fillStyle = '#ffe867';
        ctx.font = '700 15px "Courier Prime", monospace';
        ctx.fillText('(())   (())', 0, -23);
        ctx.fillStyle = '#7bd3ff';
        ctx.font = '700 14px "Courier Prime", monospace';
        ctx.fillText(' o       o ', 0, -23);
      }
      if (state.effects.hopeHalo > 0) {
        ctx.fillStyle = '#fff1a6';
        ctx.font = '700 16px "Courier Prime", monospace';
        ctx.fillText('o---o', 0, -58);
      }
      if (state.effects.loveJump > 0) {
        ctx.fillStyle = '#ffb4e4';
        ctx.font = '700 14px "Courier Prime", monospace';
        ctx.fillText('<3', 30, -18);
      }
      ctx.restore();
    }

    function drawRivalEntity(rv) {
      if (!rv.active) return;
      if (state.mode === MODE.START || state.mode === MODE.PAUSED) return;

      const bob = rv.type === 'chameleon' ? 0 : Math.sin(state.frame * 0.11 + rv.x * 0.02) * 2;
      const rx = rv.x;
      const ry = rv.y + bob;

      ctx.save();
      ctx.globalAlpha = getVisibilityFactor('rival', rv.x, rv.y);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = '700 19px "Courier Prime", monospace';

      if (rv.type === 'bluefrog') {
        ctx.shadowBlur = 14;
        ctx.shadowColor = '#74baff';
        ctx.fillStyle = '#74baff';
        const bite = rv.eatCooldown > 0 ? '>OO<' : '>__<';
        const art = [
          '  _   _  ',
          ' (o) (o) ',
          `/( ${bite} )\\`,
          ' ^^   ^^ '
        ];
        for (let i = 0; i < art.length; i++) {
          ctx.fillText(art[i], rx, ry - 30 + i * 16);
        }
      } else {
        ctx.shadowBlur = 16;
        ctx.shadowColor = '#b8ffce';
        const art = [
          '  .-^-.-.  ',
          ' ((o)(o))> ',
          ' /{=~=~}=\\ ',
          '   /\\  /\\  '
        ];
        const pal = ['#9dff7a', '#7bd6ff', '#ff9ad8', '#ffe077'];
        const base = Math.floor(state.frame / 7);
        for (let i = 0; i < art.length; i++) {
          ctx.fillStyle = pal[(base + i) % pal.length];
          ctx.fillText(art[i], rx, ry - 30 + i * 16);
        }

        if (rv.chTongue.active && rv.chTongue.len > 4) {
          const mouthX = rx + (rx < state.cx ? 10 : -10);
          const mouthY = ry - 4;
          const ch = glyphForAngle(rv.chTongue.angle);
          ctx.shadowBlur = 0;
          ctx.fillStyle = '#ffd78d';
          ctx.font = '700 16px "Courier Prime", monospace';
          for (let d = 8; d < rv.chTongue.len; d += 9) {
            ctx.fillText(ch, mouthX + Math.cos(rv.chTongue.angle) * d, mouthY + Math.sin(rv.chTongue.angle) * d);
          }
          const tx = mouthX + Math.cos(rv.chTongue.angle) * rv.chTongue.len;
          const ty = mouthY + Math.sin(rv.chTongue.angle) * rv.chTongue.len;
          ctx.fillText(rv.chTongue.catchGlyph || 'o', tx, ty);
        }
      }

      ctx.shadowBlur = 0;
      ctx.fillStyle = '#e8f8ff';
      ctx.font = '700 14px "Courier Prime", monospace';
      ctx.fillText(`[R] ${rv.score}`, rx, ry - 52);
      ctx.restore();
    }

    function drawRivals() {
      drawRivalEntity(state.rival);
      drawRivalEntity(state.rival2);
    }

    function drawTongue() {
      const tongue = state.tongue;
      if (tongue.state === 'IDLE' || tongue.length <= 0) return;

      const px = -tongue.dy;
      const py = tongue.dx;
      const spinChars = ['|', '/', '-', '\\'];

      ctx.globalAlpha = getVisibilityFactor('frog');
      ctx.fillStyle = '#ff77c7';
      ctx.font = '700 18px "Courier Prime", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      const thick = state.effects.medicinal > 0 ? 2 : 1;
      for (let d = 14; d < tongue.length; d += 10) {
        const pt = getTonguePoint(d);
        let ch;
        if (state.effects.spiral > 0) {
          ch = spinChars[(Math.floor((d + state.frame) / 5)) % spinChars.length];
        } else {
          if (Math.abs(tongue.dx) > 0.001 && Math.abs(tongue.dy) > 0.001) {
            ch = tongue.dx * tongue.dy > 0 ? '\\' : '/';
          } else {
            ch = Math.abs(tongue.dx) > Math.abs(tongue.dy) ? '=' : '|';
          }
        }
        ctx.fillText(ch, pt.x, pt.y);
        if (thick > 1) {
          ctx.fillText(ch, pt.x + px * 4, pt.y + py * 4);
          ctx.fillText(ch, pt.x - px * 4, pt.y - py * 4);
        }
      }

      const tip = getTonguePoint(tongue.length);

      if (tongue.caughtFlies.length > 0) {
        const last = tongue.caughtFlies[tongue.caughtFlies.length - 1];
        ctx.fillStyle = last.color;
        const cap = last.id === 'letter' ? `[${last.letter}]` : `>${last.def.glyph}<`;
        ctx.fillText(cap, tip.x, tip.y);
      } else {
        ctx.fillStyle = state.effects.spiral > 0 ? '#bfe8ff' : '#ff97cf';
        ctx.fillText(state.effects.spiral > 0 ? '@' : 'O', tip.x, tip.y);
      }
      ctx.globalAlpha = 1;
    }

    function drawFloatTexts() {
      ctx.font = uiFont(18, 700);

      for (const t of state.floatTexts) {

        ctx.globalAlpha = clamp(state.levelIntroTimer / 2.1, 0, 1);
