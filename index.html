<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ASCII FROG</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');

    :root {
      --ui-bg: rgba(8, 14, 10, 0.62);
      --ui-border: rgba(180, 255, 180, 0.34);
      --ui-text: #e6ffe6;
      --ui-accent: #83ff83;
      --ui-warn: #ffd166;
      --ui-danger: #ff7070;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Courier Prime', monospace;
      color: var(--ui-text);
      touch-action: none;
    }

    html[lang="hi"] body {
      font-family: "Nirmala UI", "Mangal", "Noto Sans Devanagari", sans-serif;
    }

    #wrap {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    #hud {
      position: absolute;
      left: 12px;
      top: 12px;
      display: grid;
      gap: 10px;
      pointer-events: none;
      z-index: 10;
    }

    .panel {
      background: var(--ui-bg);
      border: 1px solid var(--ui-border);
      border-radius: 8px;
      padding: 8px 10px;
      min-width: 260px;
      text-shadow: 0 1px 0 #000;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.45) inset;
    }

    .line {
      font-size: 14px;
      line-height: 1.35;
      white-space: nowrap;
    }

    #status {
      color: var(--ui-accent);
      font-weight: 700;
    }

    .line-soft {
      color: rgba(226, 255, 226, 0.82);
    }

    #help {
      position: absolute;
      top: 12px;
      right: 12px;
      pointer-events: none;
      z-index: 10;
      text-align: right;
    }

    #help .line {
      font-size: 14px;
      opacity: 0.92;
    }

    #flashBar {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      min-width: 280px;
      max-width: min(78vw, 760px);
      text-align: center;
      pointer-events: none;
      z-index: 11;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    #flashBar.show {
      opacity: 1;
    }

    #mobile-controls {
      position: absolute;
      left: max(12px, env(safe-area-inset-left));
      right: max(12px, env(safe-area-inset-right));
      bottom: max(12px, env(safe-area-inset-bottom));
      display: none;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      z-index: 20;
      user-select: none;
      pointer-events: none;
    }

    .mobile-cluster {
      display: flex;
      pointer-events: none;
    }

    .action-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(66px, 82px));
      gap: 8px;
      pointer-events: none;
    }

    .d-pad-row {
      display: flex;
      gap: 7px;
      align-items: center;
      justify-content: center;
    }

    .d-btn {
      width: 58px;
      height: 58px;
      border-radius: 12px;
      border: 1px solid rgba(200, 255, 200, 0.35);
      background: rgba(18, 30, 18, 0.65);
      color: #e4ffe4;
      font-size: 28px;
      display: grid;
      place-items: center;
      pointer-events: auto;
      text-shadow: 0 1px 0 #000;
      box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.35);
      cursor: pointer;
      pointer-events: auto;
      touch-action: manipulation;
    }

    .d-btn:active {
      transform: translateY(1px);
      background: rgba(42, 72, 42, 0.82);
    }

    .d-btn.is-disabled {
      opacity: 0.44;
      filter: grayscale(0.35);
    }

    .d-btn.is-armed {
      background: rgba(82, 118, 58, 0.92);
      border-color: rgba(234, 255, 153, 0.6);
      color: #fff7c0;
    }

    .action-btn {
      width: 76px;
      height: 50px;
      font-size: 12px;
      letter-spacing: 0.04em;
      font-weight: 700;
      padding: 0 6px;
    }

    .d-pad {
      display: grid;
      grid-template-columns: repeat(3, 58px);
      grid-template-rows: repeat(3, 58px);
      gap: 7px;
      align-items: center;
      justify-items: center;
      pointer-events: none;
    }

    .d-pad .d-btn {
      pointer-events: auto;
    }

    .spacer {
      width: 58px;
      height: 58px;
    }

    @media (max-width: 920px), (hover: none), (pointer: coarse) {
      #mobile-controls {
        display: flex;
      }

      #flashBar {
        bottom: calc(max(12px, env(safe-area-inset-bottom)) + 124px);
      }
    }

    @media (max-width: 640px), (max-height: 860px) {
      .action-grid {
        grid-template-columns: repeat(2, minmax(62px, 74px));
      }

      .action-btn {
        width: 70px;
        height: 46px;
        font-size: 11px;
      }

      .d-pad {
        grid-template-columns: repeat(3, 54px);
        grid-template-rows: repeat(3, 54px);
      }

      .d-pad .d-btn,
      .spacer {
        width: 54px;
        height: 54px;
      }
    }
  </style>
</head>
<body>

        <div class="line line-soft" id="questLine">FLOW: WATCH THE FIELD</div>
      </div>
    </div>

    <div id="help" class="panel">
      <div class="line" id="helpShootLine">ARROWS: SHOOT</div>
      <div class="line" id="helpJumpLine">SPACE+ARROW: JUMP (L3+) | REVERSE: BRAKE</div>
      <div class="line" id="helpControlLine">ENTER: START | P: PAUSE | F: FULLSCREEN | M: MUTE</div>
      <div class="line" id="helpMedLine">X: MED LINE SHOT</div>
      <div class="line" id="audioLine">SOUND: TAP OR PRESS A KEY</div>

    <div id="flashBar" class="panel">
      <div class="line" id="flashLine">READ THE SWAMP</div>
    </div>

    <div id="mobile-controls" aria-label="Touch controls">
      <div class="mobile-cluster" id="mobile-actions">
        <div class="action-grid">

          <button class="d-btn action-btn" id="btn-line" aria-label="Medicinal line shot">LINE</button>
          <button class="d-btn action-btn" id="btn-mute" aria-label="Mute audio">MUTE</button>
          <button class="d-btn action-btn" id="btn-full" aria-label="Toggle fullscreen">FULL</button>
        </div>
      </div>

      <div class="mobile-cluster" id="mobile-dpad">
        <div class="d-pad">
          <div class="spacer" aria-hidden="true"></div>
          <button class="d-btn" id="btn-up" aria-label="Shoot up">▲</button>
          <div class="spacer" aria-hidden="true"></div>
          <button class="d-btn" id="btn-left" aria-label="Shoot left">◄</button>

          <button class="d-btn" id="btn-down" aria-label="Shoot down">▼</button>
          <div class="spacer" aria-hidden="true"></div>
        </div>
      </div>
    </div>
  </div>

    function ensureAudio() {
      if (!audioCtx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (AC) {
          audioCtx = new AC();
          masterGain = audioCtx.createGain();
          masterGain.gain.value = audioState.muted ? 0 : 1;
          masterGain.connect(audioCtx.destination);
          audioCtx.onstatechange = () => {
            audioState.unlocked = audioCtx.state === 'running';
            updateAudioLine();
          };
        } else {
          audioState.unavailable = true;
        }
      }
      updateAudioLine();
      return audioCtx;
    }

    function updateAudioLine() {
      if (audioState.unavailable) {
        audioLine.textContent = isHindi() ? 'ध्वनि: उपलब्ध नहीं' : 'SOUND: NOT SUPPORTED';
        return;
      }
      if (!audioCtx) {
        audioLine.textContent = isHindi() ? 'ध्वनि: टैप करो या कोई कुंजी दबाओ' : 'SOUND: TAP OR PRESS A KEY';
        return;
      }
      if (audioState.muted) {
        audioLine.textContent = isHindi() ? 'ध्वनि: म्यूट (M दबाओ)' : 'SOUND: MUTED (PRESS M)';
        return;
      }
      if (audioCtx.state === 'running') {
        audioLine.textContent = isHindi() ? 'ध्वनि: चालू' : 'SOUND: ON';
        return;
      }
      if (audioCtx.state === 'suspended') {
        audioLine.textContent = isHindi() ? 'ध्वनि: रुकी है, टैप करो या कुंजी दबाओ' : 'SOUND: BLOCKED, TAP OR PRESS A KEY';
        return;
      }
      audioLine.textContent = isHindi() ? `ध्वनि: ${audioCtx.state.toUpperCase()}` : `SOUND: ${audioCtx.state.toUpperCase()}`;
    }

    function syncMasterGain() {
      if (!masterGain || !audioCtx) return;
      masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
      masterGain.gain.setValueAtTime(audioState.muted ? 0 : 1, audioCtx.currentTime);
      updateAudioLine();
    }

    function unlockAudio() {
      ensureAudio();
      if (!audioCtx) return;
      if (audioCtx.state === 'suspended') {
        audioCtx.resume()
          .then(() => {
            audioState.unlocked = true;
            syncMasterGain();
          })
          .catch(() => {
            updateAudioLine();
          });
        return;
      }
      audioState.unlocked = audioCtx.state === 'running';
      syncMasterGain();
    }

    function toggleMute() {
      audioState.muted = !audioState.muted;
      syncMasterGain();
      if (!audioState.muted) unlockAudio();
      updateMobileControlsState();
    }

    function beep(config) {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = config.type || 'square';
      osc.connect(gain);
      gain.connect(masterGain || audioCtx.destination);
      osc.frequency.setValueAtTime(config.from, now);
      if (config.to) {
        osc.frequency.exponentialRampToValueAtTime(config.to, now + config.duration);
      }
      gain.gain.setValueAtTime(config.gain || 0.08, now);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + config.duration);
      osc.start(now);
      osc.stop(now + config.duration);
    }

    function playBitNote(freq, duration, gainValue, wave = 'square') {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = wave;
      osc.frequency.setValueAtTime(freq, now);
      osc.connect(gain);
      gain.connect(masterGain || audioCtx.destination);
      gain.gain.setValueAtTime(gainValue, now);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      osc.start(now);
      osc.stop(now + duration);
    }

    function playCatchCelebrate(fly) {
      if (!fly) {
        playSound('eat');
        return;
      }
      if (fly.id === 'grasshopper') {
        playSound('eatGrasshopper');
        return;
      }
      if (fly.id === 'firefly') {
        playSound('eatFirefly');
        return;
      }
      if (fly.id === 'hourglass') {
        playSound('eatHourglass');
        return;
      }
      if (fly.id === 'poison') {
        playSound('eatPoison');
        return;
      }
      if (fly.id === 'spiral') {
        playSound('eatSpiral');
        return;
      }
      if (fly.id === 'letter') {
        playSound('eatLetter');
        return;
      }
      if (fly.id === 'medicinal') {
        playSound('eatMedicinal');
        return;
      }
      playSound('eat');
    }

    function startBitMusic() {
      unlockAudio();
      if (!audioCtx) return;
      const nextMode = state.mode === MODE.WIN ? 'WIN' : (state.mode === MODE.PLAYING && activeRivals().length > 0 ? 'RIVAL' : 'GAME');
      const nextTempo = nextMode === 'WIN' ? music.winTempoMs : (nextMode === 'RIVAL' ? music.rivalTempoMs : music.tempoMs);
      if (music.timer && music.mode === nextMode) return;
      if (music.timer) {
        window.clearInterval(music.timer);
        music.timer = null;
      }
      music.mode = nextMode;
      music.step = 0;
      music.timer = window.setInterval(() => {
        if (![MODE.START, MODE.PLAYING, MODE.WIN].includes(state.mode)) return;
        const liveMode = state.mode === MODE.WIN ? 'WIN' : (state.mode === MODE.PLAYING && activeRivals().length > 0 ? 'RIVAL' : 'GAME');
        if (liveMode !== music.mode) {
          window.clearInterval(music.timer);
          music.timer = null;
          startBitMusic();
          return;
        }
        if (state.mode === MODE.WIN) {
          if (state.ending.timer < getEndingCelebrationDuration()) {
            const i = music.step % music.congratsLead.length;
            const j = music.step % music.congratsBass.length;
            const s = music.step % music.congratsSpark.length;
            playBitNote(music.congratsLead[i], 0.16, 0.018, 'square');
            if (music.step % 2 === 0) {
              playBitNote(music.congratsBass[j], 0.2, 0.012, 'triangle');
            }
            if (music.step % 4 === 1) {
              playBitNote(music.congratsSpark[s], 0.07, 0.01, 'square');
            }
            if (music.step % 8 === 5) {
              playBitNote(music.loveLead[i % music.loveLead.length] * 1.5, 0.08, 0.008, 'triangle');
            }
          } else {
            const i = music.step % music.winLead.length;
            const j = music.step % music.winBass.length;
            const s = music.step % music.winSpark.length;
            if (music.step % 2 === 0) {
              playBitNote(music.winLead[i], 0.19, 0.014, 'square');
            }
            if (music.step % 4 === 0) {
              playBitNote(music.winBass[j], 0.24, 0.01, 'triangle');
            }
            if (music.step % 8 === 2) {
              playBitNote(music.loveLead[i % music.loveLead.length], 0.12, 0.008, 'triangle');
            }
            if (music.step % 8 === 6) {
              playBitNote(music.winSpark[s], 0.08, 0.007, 'square');
            }
            if (music.step % 16 === 10) {
              playBitNote(music.loveLead[i] * 1.25, 0.11, 0.006, 'triangle');
            }
          }
        } else if (state.mode === MODE.PLAYING && activeRivals().length > 0) {
          const i = music.step % music.rivalLead.length;
          const j = music.step % music.rivalBass.length;
          playBitNote(music.rivalLead[i], 0.08, 0.022, 'square');
          playBitNote(music.rivalBass[j], 0.11, 0.012, 'triangle');
          if (music.step % 2 === 0) {
            playBitNote(music.rivalLead[i] * 1.5, 0.04, 0.009, 'square');
          }
        } else {
          const i = music.step % music.lead.length;
          const j = music.step % music.bass.length;
          playBitNote(music.lead[i], 0.1, 0.018, 'square');
          if (music.step % 2 === 0) {
            playBitNote(music.bass[j], 0.15, 0.012, 'triangle');
          }
          if (music.step % 8 === 4) {
            playBitNote(music.lead[i] * 2, 0.05, 0.01, 'square');
          }
        }
        music.step += 1;
      }, nextTempo);
    }

    function playSound(kind) {
      if (!audioCtx) return;
      if (kind === 'shoot') {
        beep({ type: 'square', from: 360, to: 170, duration: 0.07, gain: 0.06 });
      } else if (kind === 'eat') {
        beep({ type: 'square', from: 1300, to: 1700, duration: 0.06, gain: 0.05 });
        window.setTimeout(() => beep({ type: 'square', from: 1700, to: 2100, duration: 0.05, gain: 0.04 }), 30);
      } else if (kind === 'eatGrasshopper') {
        beep({ type: 'square', from: 760, to: 980, duration: 0.05, gain: 0.046 });
        window.setTimeout(() => beep({ type: 'square', from: 980, to: 1360, duration: 0.06, gain: 0.042 }), 28);

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function frogX() {
      return state.cx + state.frog.ox;
    }

    function frogY() {
      return state.cy + state.frog.oy - state.frog.jumpZ;
    }

    function normalizeAngle(rad) {
      let a = rad;
      while (a > Math.PI) a -= Math.PI * 2;
      while (a < -Math.PI) a += Math.PI * 2;
      return a;
    }

    function lerpAngle(current, target, alpha) {
      const diff = normalizeAngle(target - current);
      return current + diff * alpha;
    }

    function distPointToSegment(px, py, ax, ay, bx, by) {
      const abx = bx - ax;
      const aby = by - ay;
      const ab2 = abx * abx + aby * aby;
      if (ab2 <= 0.00001) return Math.hypot(px - ax, py - ay);
      const apx = px - ax;
      const apy = py - ay;
      const t = clamp((apx * abx + apy * aby) / ab2, 0, 1);
      const cx = ax + abx * t;
      const cy = ay + aby * t;
      return Math.hypot(px - cx, py - cy);
    }

    function getEndingTongueBases() {
      return {
        leftX: state.cx - 120,
        leftY: state.cy + 24,
        rightX: state.cx + 120,
        rightY: state.cy + 24
      };
    }

    function getEndingTongueTip(tongue, baseX, baseY) {
      return {
        x: baseX + Math.cos(tongue.angle) * tongue.len,
        y: baseY + Math.sin(tongue.angle) * tongue.len
      };
    }

    function getEndingCelebrationDuration() {
      return 5.6;
    }

    function getEndingCelebrationFadeWindow() {
      return 1.5;
    }

    function getEndingCelebrationBlend() {
      const start = getEndingCelebrationDuration() - getEndingCelebrationFadeWindow();
      if (state.ending.timer <= start) return 1;
      return clamp((getEndingCelebrationDuration() - state.ending.timer) / getEndingCelebrationFadeWindow(), 0, 1);
    }

    function getEndingStarryBlend() {
      const introS = getEndingCelebrationDuration();
      const cycleS = 28;
      const t = Math.max(0, state.ending.timer - introS) % cycleS;
      if (t < 7) return 0;
      if (t < 11) return (t - 7) / 4;
      if (t < 17) return 1;
      if (t < 21) return 1 - ((t - 17) / 4);
      return 0;
    }

    function getEndingPhase() {
      if (state.ending.timer < getEndingCelebrationDuration()) return 'CELEBRATION';
      return getEndingScene();
    }

    function getEndingScene() {
      return getEndingStarryBlend() >= 0.5 ? 'STARRY' : 'HEARTS';
    }

    function getDirectionUnit(dirName) {
      const dirs = {
        UP: { x: 0, y: -1 },
        DOWN: { x: 0, y: 1 },
        LEFT: { x: -1, y: 0 },
        RIGHT: { x: 1, y: 0 },
        UP_LEFT: { x: -Math.SQRT1_2, y: -Math.SQRT1_2 },
        UP_RIGHT: { x: Math.SQRT1_2, y: -Math.SQRT1_2 },
        DOWN_LEFT: { x: -Math.SQRT1_2, y: Math.SQRT1_2 },
        DOWN_RIGHT: { x: Math.SQRT1_2, y: Math.SQRT1_2 }
      };
      return dirs[dirName] || dirs.RIGHT;
    }

    function canUseDirectionalSight(dirName) {
      return state.mode === MODE.PLAYING
        && !String(dirName || '').includes('_')
        && state.level >= 11
        && activeRivals().length > 0
        && state.weather.darkness > 0.38
        && state.effects.nightVision > 0;
    }

    function primeDirectionalSight(dirName, timer = 0.58) {
      state.directionalSight.dir = dirName || state.frog.facing || 'RIGHT';
      state.directionalSight.timer = Math.max(state.directionalSight.timer, timer);
    }

    function getDirectionalSightBoost(x, y) {
      if (state.directionalSight.timer <= 0 || state.effects.nightVision <= 0 || state.weather.darkness <= 0.2) return 0;
      if (!Number.isFinite(x) || !Number.isFinite(y)) return 0;
      const dx = x - frogX();
      const dy = y - frogY();
      const dist = Math.hypot(dx, dy);
      if (dist <= 2 || dist > 440) return 0;
      const dir = getDirectionUnit(state.directionalSight.dir || state.frog.facing || 'RIGHT');
      const dot = (dx * dir.x + dy * dir.y) / dist;
      if (dot < 0.42) return 0;
      const cone = clamp((dot - 0.42) / 0.58, 0, 1);
      const reach = clamp(1 - dist / 440, 0, 1);
      const timerFactor = clamp(state.directionalSight.timer / 0.58, 0.2, 1);
      return clamp((cone * 0.82 + reach * 0.18) * timerFactor, 0, 1);
    }

    function getVisibilityFactor(kind = 'default', x = NaN, y = NaN) {
      const darkness = clamp(state.weather.darkness || 0, 0, 0.72);
      if (darkness <= 0.01) return 1;
      let base = 1;
      if (kind === 'firefly') {
        base = clamp(0.92 + darkness * 0.34, 0.92, 1.25);
      } else if (kind === 'frog') {
        base = clamp(1 - darkness * 0.06, 0.94, 1);
      } else if (kind === 'rival') {
        base = clamp(1 - darkness * 1.22, 0.05, 1);
      } else {
        base = clamp(1 - darkness * 1.34, 0.04, 1);
      }
      if (kind === 'frog') return base;
      const sightBoost = getDirectionalSightBoost(x, y);
      const boostScale = kind === 'rival' ? 0.54 : 0.66;
      const hi = kind === 'firefly' ? 1.25 : 1;
      return clamp(base + sightBoost * boostScale, 0.2, hi);
    }

    function getEndingLayout() {
      const bases = getEndingTongueBases();
      return {
        leftX: bases.leftX,
        rightX: bases.rightX,
        leftY: bases.leftY - 10,
        rightY: bases.rightY - 10,
        titleY: state.cy + 136
      };
    }

    function mixHexColors(a, b, t) {
      const blend = clamp(t, 0, 1);
      const parse = (hex) => {
        const clean = hex.replace('#', '');
        return {
          r: parseInt(clean.slice(0, 2), 16),
          g: parseInt(clean.slice(2, 4), 16),
          b: parseInt(clean.slice(4, 6), 16)
        };
      };
      const from = parse(a);
      const to = parse(b);
      const r = Math.round(from.r + (to.r - from.r) * blend);
      const g = Math.round(from.g + (to.g - from.g) * blend);
      const bVal = Math.round(from.b + (to.b - from.b) * blend);
      return `rgb(${r}, ${g}, ${bVal})`;
    }

    function glyphForAngle(angle) {
      const a = normalizeAngle(angle);
      if (Math.abs(a) < Math.PI / 8 || Math.abs(a) > (Math.PI * 7) / 8) return '=';
      if (a > Math.PI / 8 && a < (Math.PI * 3) / 8) return '\\';
      if (a > (Math.PI * 3) / 8 && a < (Math.PI * 5) / 8) return '|';
      if (a > (Math.PI * 5) / 8 && a < (Math.PI * 7) / 8) return '/';
      if (a < -Math.PI / 8 && a > -(Math.PI * 3) / 8) return '/';
      if (a < -(Math.PI * 3) / 8 && a > -(Math.PI * 5) / 8) return '|';
      if (a < -(Math.PI * 5) / 8 && a > -(Math.PI * 7) / 8) return '\\';
      return '=';
    }

    function getLevelConfig(level) {
      const idx = clamp(level - 1, 0, LEVELS.length - 1);
      return LEVELS[idx];
    }

    function weightedPick(pool) {
      let total = 0;
      for (const k of Object.keys(pool)) total += pool[k];
      if (total <= 0) return 'normal';
      const roll = Math.random() * total;
      let acc = 0;
      for (const k of Object.keys(pool)) {
        acc += pool[k];
        if (roll <= acc) return k;
      }
      return 'normal';
    }

    function createBackground() {
      state.bgPattern = [];
      const amount = Math.max(100, Math.floor((state.width * state.height) / 13000));
      for (let i = 0; i < amount; i++) {
        state.bgPattern.push({
          x: Math.random() * state.width,
          y: Math.random() * state.height,
          drift: 0.2 + Math.random() * 1.2
        });
      }
    }

    function pickQuestLetter() {
      const target = state.quest.target || 'LOVE';
      const expected = target[state.quest.progress] || target[0];
      const cycle = state.quest.spawnCycle;
      const cycleLetter = target[cycle % Math.max(1, target.length)];
      state.quest.spawnCycle += 1;
      if (cycle < target.length * 2) return cycleLetter;
      if (Math.random() < 0.58) return expected;
      if (Math.random() < 0.88) return cycleLetter;
      return target[Math.floor(Math.random() * target.length)];
    }

    class Fly {
      constructor(typeId, letter = '') {
        this.id = typeId;
        this.def = FLY_DEFS[typeId];
        this.letter = letter;
        this.x = 0;
        this.y = 0;
        this.heading = 0;
        this.time = Math.random() * 20;
        this.wiggle = Math.random() * Math.PI * 2;
        this.color = this.def.color;
        this.points = this.def.points;
        this.radius = this.def.radius;
        const speedByType = {
          normal: [1.05, 1.22, 0.012],
          grasshopper: [1.2, 1.45, 0.014],
          bomb: [0.78, 0.95, 0.01],
          firefly: [0.98, 1.15, 0.012],
          hourglass: [0.94, 1.08, 0.011],
          poison: [1.02, 1.24, 0.013],
          spiral: [1.1, 1.34, 0.014],
          letter: [1.05, 1.22, 0.012],
          medicinal: [0.95, 1.12, 0.011]
        };
        const [sMin, sMax, lvlGain] = speedByType[this.id] || [1, 1.2, 0.012];
        this.speed = sMin + Math.random() * (sMax - sMin) + state.level * lvlGain;
        this.burstTimer = 0.25 + Math.random() * 0.4;
        this.bursting = false;
        this.pauseTimer = 0;
        this.orbit = Math.random() * Math.PI * 2;
        this.spin = Math.random() * Math.PI * 2;
        this.orbitEligible = true;
        this.orbitDelay = state.level <= 1 ? (1.7 + Math.random() * 1.1) : (0.12 + Math.random() * 0.38);
        this.orbitRadius = 90 + Math.random() * 130;
        this.orbitTurn = (Math.random() > 0.5 ? 1 : -1) * (0.9 + Math.random() * 1.4);
        this.orbitWeight = 0.82 + Math.random() * 0.42;
        this.orbitDiveClock = 1.6 + Math.random() * 2.2;
        this.orbitDiveBoost = 0;
        this.wanderX = Math.random() * state.width;
        this.wanderY = Math.random() * state.height;
        this.wanderTimer = 0.7 + Math.random() * 1.9;
        this.camouflageEnabled = state.level >= 11 && ['normal', 'grasshopper', 'firefly', 'poison'].includes(this.id) && Math.random() < 0.2;
        this.camouflaged = false;
        this.camouflageTimer = 1.4 + Math.random() * 1.6;

        this.x = Math.random() * state.width;
        this.y = Math.random() * state.height;
        this.heading = Math.random() * Math.PI * 2;
      }

      update(dt) {
        this.time += dt;
        const aiFlySpeedScale = state.aiDirector.runtime.flySpeedScale;
        const aiFrogPullScale = state.aiDirector.runtime.flyFrogPullScale;
        if (this.camouflageEnabled) {
          this.camouflageTimer -= dt;
          if (this.camouflageTimer <= 0) {
            this.camouflaged = !this.camouflaged;
            this.camouflageTimer = this.camouflaged ? (1.0 + Math.random() * 0.9) : (1.6 + Math.random() * 1.8);
          }
        }
        this.wanderTimer -= dt;
        if (this.wanderTimer <= 0) {
          const frogChance = clamp((0.035 + state.level * 0.006) * aiFrogPullScale, 0.015, 0.22);
          if (Math.random() < frogChance) {
            this.wanderX = frogX() + (Math.random() - 0.5) * 420;
            this.wanderY = frogY() + (Math.random() - 0.5) * 340;
          } else {
            this.wanderX = Math.random() * state.width;
            this.wanderY = Math.random() * state.height;
          }
          this.wanderTimer = 1.15 + Math.random() * 2.6;
        }
        const targetAngle = Math.atan2(this.wanderY - this.y, this.wanderX - this.x);

        if (this.id === 'normal') {
          const lazyTarget = targetAngle + Math.sin(this.time * 0.85 + this.wiggle) * 0.45;
          this.heading = lerpAngle(this.heading, lazyTarget, 0.018);
          const drift = Math.sin(this.time * 5.2 + this.wiggle) * 1.0;
          const forward = this.speed * aiFlySpeedScale * 47 * dt;
          this.x += Math.cos(this.heading) * forward + Math.cos(this.heading + Math.PI / 2) * drift;
          this.y += Math.sin(this.heading) * forward + Math.sin(this.heading + Math.PI / 2) * drift;
        } else if (this.id === 'grasshopper') {
          this.burstTimer -= dt;
          if (this.burstTimer <= 0) {
            this.bursting = !this.bursting;
            this.burstTimer = this.bursting ? 0.18 + Math.random() * 0.07 : 0.34 + Math.random() * 0.22;
            if (this.bursting) {
              const tx = this.wanderX + (Math.random() - 0.5) * 120;
              const ty = this.wanderY + (Math.random() - 0.5) * 110;
              this.heading = Math.atan2(ty - this.y, tx - this.x);
            }
          }
          const factor = this.bursting ? 2.0 : 0.24;
          const hopSway = Math.sin(this.time * 13 + this.wiggle) * (this.bursting ? 1.2 : 0.35);
          this.x += Math.cos(this.heading) * this.speed * aiFlySpeedScale * 52 * dt * factor + Math.cos(this.heading + Math.PI / 2) * hopSway;
          this.y += Math.sin(this.heading) * this.speed * aiFlySpeedScale * 52 * dt * factor + Math.sin(this.heading + Math.PI / 2) * hopSway;
        } else if (this.id === 'bomb') {
          this.heading = lerpAngle(this.heading, targetAngle, 0.022);
          const hover = Math.sin(this.time * 2.6 + this.wiggle) * 0.42;
          const drift = this.speed * aiFlySpeedScale * 36 * dt;
          this.x += Math.cos(this.heading + hover) * drift;
          this.y += Math.sin(this.heading - hover) * drift + Math.sin(this.time * 3.2 + this.wiggle) * 0.35;
        } else if (this.id === 'firefly') {
          this.orbit += dt * (1.4 + this.speed * aiFlySpeedScale * 0.55);
          if (Math.random() < 0.008) this.pauseTimer = 0.12 + Math.random() * 0.16;
          if (this.pauseTimer > 0) {
            this.pauseTimer -= dt;
            this.x += Math.cos(this.orbit * 2.2) * 0.45;
            this.y += Math.sin(this.orbit * 2.2) * 0.45;
          } else {
            const target = targetAngle + Math.sin(this.orbit * 0.8) * 0.65;
            this.heading = lerpAngle(this.heading, target, 0.03);
            const side = Math.sin(this.orbit * 2.4) * 1.5;
            const forward = this.speed * aiFlySpeedScale * 42 * dt;
            this.x += Math.cos(this.heading) * forward + Math.cos(this.heading + Math.PI / 2) * side;
            this.y += Math.sin(this.heading) * forward + Math.sin(this.heading + Math.PI / 2) * side;
          }
        } else if (this.id === 'hourglass') {
          this.orbit += dt * 1.3;
          const target = targetAngle + Math.sin(this.orbit * 0.7) * 0.3;
          this.heading = lerpAngle(this.heading, target, 0.024);
          const wobble = Math.sin(this.orbit * 3.4) * 1.15;
          const glide = this.speed * aiFlySpeedScale * 39 * dt;
          this.x += Math.cos(this.heading) * glide + Math.cos(this.heading + Math.PI / 2) * wobble;
          this.y += Math.sin(this.heading) * glide + Math.sin(this.orbit * 2.6) * 1.2;
        } else if (this.id === 'poison') {
          if (Math.random() < 0.03) {
            this.heading += (Math.random() - 0.5) * 0.9;
          }
          const target = targetAngle + Math.sin(this.time * 2.3 + this.wiggle) * 0.92;
          this.heading = lerpAngle(this.heading, target, 0.024);
          const zig = Math.sin(this.time * 8 + this.wiggle) * 1.2;
          const forward = this.speed * aiFlySpeedScale * 45 * dt;
          this.x += Math.cos(this.heading) * forward + Math.cos(this.heading + Math.PI / 2) * zig;
          this.y += Math.sin(this.heading) * forward + Math.sin(this.heading + Math.PI / 2) * zig;
        } else if (this.id === 'spiral') {
          this.spin += dt * 3.8;
          const target = targetAngle + Math.sin(this.spin * 0.5) * 0.34;
          this.heading = lerpAngle(this.heading, target, 0.032);
          const swirlR = 2 + Math.sin(this.spin * 2.1) * 1.8;
          const forward = this.speed * aiFlySpeedScale * 47 * dt;
          this.x += Math.cos(this.heading) * forward + Math.cos(this.spin) * swirlR;
          this.y += Math.sin(this.heading) * forward + Math.sin(this.spin) * swirlR;
        } else if (this.id === 'letter') {
          this.orbit += dt * 1.25;
          const target = targetAngle + Math.sin(this.orbit * 0.9) * 0.22;
          this.heading = lerpAngle(this.heading, target, 0.02);
          const calm = Math.sin(this.orbit * 1.4) * 0.8;
          const forward = this.speed * aiFlySpeedScale * 40 * dt;
          this.x += Math.cos(this.heading) * forward + Math.cos(this.heading + Math.PI / 2) * calm;
          this.y += Math.sin(this.heading) * forward + Math.sin(this.heading + Math.PI / 2) * calm;
        } else if (this.id === 'medicinal') {
          this.orbit += dt * 1.35;
          const target = targetAngle + Math.cos(this.orbit * 0.6) * 0.35;
          this.heading = lerpAngle(this.heading, target, 0.024);
          const wave = Math.sin(this.orbit * 2.4) * 1.2;
          const forward = this.speed * aiFlySpeedScale * 38 * dt;
          this.x += Math.cos(this.heading) * forward + Math.cos(this.heading + Math.PI / 2) * wave;
          this.y += Math.sin(this.heading) * forward + Math.sin(this.heading + Math.PI / 2) * wave;
        }

        this.x += state.weather.windX * dt * (this.id === 'grasshopper' ? 0.08 : 0.12);

        if (this.x < -180 || this.x > state.width + 180 || this.y < -180 || this.y > state.height + 180) {
          this.wanderX = Math.random() * state.width;
          this.wanderY = Math.random() * state.height;
          this.heading = Math.atan2(this.wanderY - this.y, this.wanderX - this.x);
        }

        this.applyStrategicOrbit(dt);

        const awayX = this.x - frogX();
        const awayY = this.y - frogY();
        const frogDist = Math.hypot(awayX, awayY);
        if (frogDist < 90 && frogDist > 0.001 && Math.random() < 0.3) {
          const push = (90 - frogDist) * 0.03;
          this.x += (awayX / frogDist) * push;
          this.y += (awayY / frogDist) * push;
        }
      }

      applyStrategicOrbit(dt) {
        // Keep wide-screen spread with slight turbulence; avoid constant frog circling.
        const edge = 44;
        if (this.x < edge) this.x += (edge - this.x) * dt * 1.2;
        if (this.x > state.width - edge) this.x -= (this.x - (state.width - edge)) * dt * 1.2;
        if (this.y < edge) this.y += (edge - this.y) * dt * 1.2;
        if (this.y > state.height - edge) this.y -= (this.y - (state.height - edge)) * dt * 1.2;
        const n = Math.sin(this.time * 3.8 + this.wiggle) * 0.5;
        this.x += Math.cos(this.heading + Math.PI / 2) * n;
        this.y += Math.sin(this.heading + Math.PI / 2) * n;
      }

      draw() {
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = '700 20px "Courier Prime", monospace';
        const visibility = getVisibilityFactor(this.id === 'firefly' ? 'firefly' : 'default', this.x, this.y);

        if (this.camouflaged) {
          ctx.save();
          const trailX = Math.cos(this.heading) * 12;
          const trailY = Math.sin(this.heading) * 12;
          ctx.globalAlpha = 0.52;
          ctx.fillStyle = '#e4f7ff';
          ctx.fillText('. . .', this.x, this.y);
          ctx.globalAlpha = 0.26;
          ctx.fillText('. .', this.x - trailX, this.y - trailY);
          ctx.restore();
          return;
        }

        if (this.id === 'normal') {
          ctx.globalAlpha = visibility;
          ctx.fillStyle = this.color;
          const wings = state.frame % 10 < 5 ? '~' : '-';
          ctx.fillText(`${wings}${this.def.glyph}${wings}`, this.x, this.y);
          ctx.globalAlpha = 1;
          return;
        }

        if (this.id === 'grasshopper') {
          ctx.globalAlpha = visibility;
          ctx.fillStyle = this.color;
          const body = this.bursting ? '/h\\' : '-h-';
          ctx.fillText(body, this.x, this.y);
          ctx.globalAlpha = 1;
          return;
        }

        if (this.id === 'bomb') {
          ctx.globalAlpha = visibility;
          ctx.fillStyle = state.frame % 20 < 10 ? '#ff7575' : '#ffcaca';
          const center = state.frame % 12 < 6 ? '*' : 'X';
          ctx.fillText(`[${center}]`, this.x, this.y);
          ctx.globalAlpha = 1;
          return;
        }

        if (this.id === 'firefly') {
          ctx.save();
          ctx.globalAlpha = Math.min(1, visibility);
          ctx.shadowBlur = state.weather.darkness > 0.08 ? 16 + state.weather.darkness * 22 : 8;
          ctx.shadowColor = state.frame % 16 < 8 ? '#fff8a8' : '#ffe867';
          ctx.fillStyle = state.frame % 16 < 8 ? '#fff8a8' : '#ffe867';
          ctx.fillText(`{${state.frame % 16 < 8 ? 'o' : '*'}}`, this.x, this.y);
          ctx.restore();
          return;
        }

        if (this.id === 'hourglass') {
          ctx.save();
          ctx.globalAlpha = visibility;
          ctx.fillStyle = '#d8f4ff';
          const top = state.frame % 18 < 9 ? '{^}' : '{ }';
          const bottom = state.frame % 18 < 9 ? '{_}' : '{=}';
          ctx.fillText(top, this.x, this.y - 7);
          ctx.fillStyle = '#8fd8ff';
          ctx.fillText(bottom, this.x, this.y + 7);
          ctx.restore();
          return;
        }

        if (this.id === 'poison') {
          ctx.globalAlpha = visibility;
          ctx.fillStyle = this.color;
          ctx.fillText(state.frame % 14 < 7 ? '!p!' : ':p:', this.x, this.y);
          ctx.globalAlpha = 1;
          return;
        }

        if (this.id === 'spiral') {
          ctx.globalAlpha = visibility;
          ctx.fillStyle = this.color;
          const chars = ['@', '&', '8', '@'];
          ctx.fillText(`${chars[state.frame % chars.length]}${chars[(state.frame + 1) % chars.length]}`, this.x, this.y);
          ctx.globalAlpha = 1;
          return;
        }

        if (this.id === 'letter') {
          ctx.globalAlpha = visibility;
          ctx.fillStyle = '#e6f5ff';
          ctx.fillText(`[${this.letter}]`, this.x, this.y);
          ctx.globalAlpha = 1;
          return;
        }

        if (this.id === 'medicinal') {
          ctx.globalAlpha = visibility;
          ctx.fillStyle = '#ffd95a';
          ctx.fillText('(', this.x - 10, this.y);
          ctx.fillText(')', this.x + 10, this.y);
          ctx.fillStyle = '#ff3f3f';
          ctx.fillText('M', this.x, this.y);
          ctx.globalAlpha = 1;
          return;
        }
      }
    }

    class Particle {
      constructor(x, y, color, char, life = 0.6) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.char = char;
        const a = Math.random() * Math.PI * 2;
        const spd = 40 + Math.random() * 120;
        this.vx = Math.cos(a) * spd;
        this.vy = Math.sin(a) * spd;
        this.life = life;
        this.max = life;
      }

      update(dt) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.vy += 24 * dt;
        this.life -= dt;
      }

      draw() {
        const alpha = Math.max(0, this.life / this.max);
        if (alpha <= 0) return;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = this.color;
        ctx.font = '16px "Courier Prime", monospace';
        ctx.fillText(this.char, this.x, this.y);
        ctx.globalAlpha = 1;
      }
    }

    function addFloatText(x, y, text, color = '#ffffff') {
      state.floatTexts.push({ x, y, text, color, life: 0.95, max: 0.95, vy: -30 });
    }

    function spawnBurst(x, y, color, amount, life = 0.6) {
      const chars = ['*', '+', '.', '!', '~', ':'];
      for (let i = 0; i < amount; i++) {
        state.particles.push(new Particle(x, y, color, chars[Math.floor(Math.random() * chars.length)], life));
      }
    }

    function getVector(dir) {
      if (dir === 'UP') return { dx: 0, dy: -1 };
      if (dir === 'DOWN') return { dx: 0, dy: 1 };
      if (dir === 'LEFT') return { dx: -1, dy: 0 };
      if (dir === 'UP_RIGHT') return { dx: 0.7071, dy: -0.7071 };
      if (dir === 'UP_LEFT') return { dx: -0.7071, dy: -0.7071 };
      if (dir === 'DOWN_RIGHT') return { dx: 0.7071, dy: 0.7071 };
      if (dir === 'DOWN_LEFT') return { dx: -0.7071, dy: 0.7071 };
      return { dx: 1, dy: 0 };
    }

    function rotateDir90(dir, steps) {
      const idx = DIRS.indexOf(dir);
      if (idx !== -1) return DIRS[(idx + steps + DIRS.length) % DIRS.length];
      const sidx = SHOT_DIRS.indexOf(dir);
      if (sidx !== -1) return SHOT_DIRS[(sidx + steps * 2 + SHOT_DIRS.length) % SHOT_DIRS.length];
      return dir;
    }

    function getOppositeDir(dir) {
      if (dir === 'UP') return 'DOWN';
      if (dir === 'DOWN') return 'UP';
      if (dir === 'LEFT') return 'RIGHT';
      return 'LEFT';
    }

    function getReverseArrowCodes(dir) {
      const map = {
        UP: ['ArrowDown'],
        DOWN: ['ArrowUp'],
        LEFT: ['ArrowRight'],
        RIGHT: ['ArrowLeft'],
        UP_RIGHT: ['ArrowDown', 'ArrowLeft'],
        UP_LEFT: ['ArrowDown', 'ArrowRight'],
        DOWN_RIGHT: ['ArrowUp', 'ArrowLeft'],
        DOWN_LEFT: ['ArrowUp', 'ArrowRight']
      };
      return map[dir] || ['ArrowLeft'];
    }

    function isReversePressed(dir) {
      const codes = getReverseArrowCodes(dir);
      for (const c of codes) {
        if (keysDown.has(c)) return true;
      }
      return false;
    }

    function getCardinalFromArrowCode(code) {
      if (code === 'ArrowUp') return 'UP';
      if (code === 'ArrowDown') return 'DOWN';
      if (code === 'ArrowLeft') return 'LEFT';
      return 'RIGHT';
    }

    function getArrowShotDirection(primaryCode) {
      const up = keysDown.has('ArrowUp') || primaryCode === 'ArrowUp';
      const down = keysDown.has('ArrowDown') || primaryCode === 'ArrowDown';
      const left = keysDown.has('ArrowLeft') || primaryCode === 'ArrowLeft';
      const right = keysDown.has('ArrowRight') || primaryCode === 'ArrowRight';

      if (!(up && down) && !(left && right)) {
        if (up && right) return 'UP_RIGHT';
        if (up && left) return 'UP_LEFT';
        if (down && right) return 'DOWN_RIGHT';
        if (down && left) return 'DOWN_LEFT';
      }
      return getCardinalFromArrowCode(primaryCode);
    }

    function clearPendingArrowShot() {
      if (pendingArrowTimer) {
        clearTimeout(pendingArrowTimer);
        pendingArrowTimer = null;
      }
      pendingArrowCode = '';
    }

    function handleNightVisionArrow(dir) {
      clearPendingArrowShot();
      state.frog.facing = dir;
      if (state.directionalSight.armed && state.directionalSight.timer > 0) {
        state.directionalSight.dir = dir;
        state.directionalSight.timer = 0.34;
        state.directionalSight.armed = false;
        shootTongue(dir);
        return;
      }
      state.directionalSight.dir = dir;
      state.directionalSight.timer = 0.86;
      state.directionalSight.armed = true;
    }

    function queueArrowShot(primaryCode) {
      const dir = getArrowShotDirection(primaryCode);
      if (canUseDirectionalSight(dir)) {
        handleNightVisionArrow(dir);
        return;
      }
      if (dir.includes('_')) {
        state.directionalSight.armed = false;
        clearPendingArrowShot();
        shootTongue(dir);
        return;
      }
      state.directionalSight.armed = false;
      clearPendingArrowShot();
      pendingArrowCode = primaryCode;
      pendingArrowTimer = setTimeout(() => {
        if (pendingArrowCode !== primaryCode) return;
        pendingArrowTimer = null;
        pendingArrowCode = '';
        shootTongue(getArrowShotDirection(primaryCode));
      }, 52);
    }

    function currentConfig() {
      return getLevelConfig(state.level);
    }

    function flyUnlockLevel(id) {
      const unlocks = {
        normal: 1,
        grasshopper: 2,
        medicinal: 3,
        bomb: 4,
        firefly: 5,
        hourglass: 5,
        poison: 6,
        letter: 7,
        spiral: 8
      };
      return unlocks[id] || 99;
    }

    function isFlyUnlocked(id, level) {
      return level >= flyUnlockLevel(id);
    }

    function normalizePoolWeights(pool, fallback) {
      const keys = Object.keys(FLY_DEFS);
      const out = {};
      let total = 0;
      for (const k of keys) {
        const v = Number(pool && pool[k]);
        if (Number.isFinite(v) && v > 0) {
          out[k] = v;
          total += v;
        }
      }
      if (total <= 0) {
        return { ...fallback };
      }
      for (const k of Object.keys(out)) out[k] /= total;
      return out;
    }

    function resetDirectorRuntime() {
      state.aiDirector.runtime.active = false;
      state.aiDirector.runtime.spawnCapDelta = 0;
      state.aiDirector.runtime.spawnIntervalScale = 1;
      state.aiDirector.runtime.spawnExtraChanceDelta = 0;
      state.aiDirector.runtime.poolOverrides = null;
      state.aiDirector.runtime.flySpeedScale = 1;
      state.aiDirector.runtime.flyFrogPullScale = 1;
      state.aiDirector.runtime.rivalSpeedScale = 1;
      state.aiDirector.runtime.rivalAggressionScale = 1;
      state.aiDirector.runtime.rivalCornerHopScale = 1;
      state.aiDirector.runtime.rivalTongueRateScale = 1;
      state.aiDirector.runtime.weatherWindScale = 1;
      state.aiDirector.runtime.weatherLightningScale = 1;
      state.aiDirector.runtime.weatherDarknessScale = 1;
      state.aiDirector.runtime.weatherRainMode = 'keep';
      state.aiDirector.runtime.weatherSnowMode = 'keep';
      state.aiDirector.runtime.weatherHighWindMode = 'keep';
      state.aiDirector.directive = null;
      state.aiDirector.directiveTimer = 0;
      state.aiDirector.lastNote = '';
      state.aiDirector.source = 'LOCAL';
    }

    function normalizeDirectorDirective(raw) {
      const d = raw && typeof raw === 'object' ? raw : {};
      const duration = clamp(Number(d.duration_s || 8), 4, 18);
      const env = d.environment || {};
      const spawning = d.spawning || {};
      const flies = d.flies || {};
      const rivals = d.rivals || {};
      const overridePool = normalizePoolWeights(spawning.pool_overrides || null, currentConfig().pool);
      return {
        durationS: duration,
        note: typeof d.flavor_text === 'string' ? d.flavor_text.slice(0, 48) : '',
        environment: {
          windScale: clamp(Number(env.wind_scale || 1), 0.55, 1.6),
          lightningScale: clamp(Number(env.lightning_scale || 1), 0.5, 2.1),
          darknessScale: clamp(Number(env.darkness_scale || 1), 0.35, 1.8),
          rainMode: ['keep', 'on', 'off'].includes(env.rain_mode) ? env.rain_mode : 'keep',
          snowMode: ['keep', 'on', 'off'].includes(env.snow_mode) ? env.snow_mode : 'keep',
          highWindMode: ['keep', 'on', 'off'].includes(env.high_wind_mode) ? env.high_wind_mode : 'keep'
        },
        spawning: {
          capDelta: Math.round(clamp(Number(spawning.cap_delta || 0), -6, 6)),
          intervalScale: clamp(Number(spawning.interval_scale || 1), 0.62, 1.65),
          extraChanceDelta: clamp(Number(spawning.extra_chance_delta || 0), -0.25, 0.3),
          poolOverrides: overridePool
        },
        flies: {
          speedScale: clamp(Number(flies.speed_scale || 1), 0.72, 1.32),
          frogPullScale: clamp(Number(flies.frog_pull_scale || 1), 0.5, 1.6)
        },
        rivals: {
          speedScale: clamp(Number(rivals.speed_scale || 1), 0.72, 1.35),
          aggressionScale: clamp(Number(rivals.aggression_scale || 1), 0.72, 1.5),
          cornerHopScale: clamp(Number(rivals.corner_hop_scale || 1), 0.65, 1.6),
          tongueRateScale: clamp(Number(rivals.tongue_rate_scale || 1), 0.65, 1.6)
        }
      };
    }

    function applyDirectorDirective(rawDirective, source) {
      const d = normalizeDirectorDirective(rawDirective);
      state.aiDirector.source = source || 'LOCAL';
      state.aiDirector.lastNote = d.note || '';
      state.aiDirector.directiveTimer = d.durationS;
      state.aiDirector.directive = d;
      state.aiDirector.runtime.active = true;
      state.aiDirector.runtime.spawnCapDelta = d.spawning.capDelta;
      state.aiDirector.runtime.spawnIntervalScale = d.spawning.intervalScale;
      state.aiDirector.runtime.spawnExtraChanceDelta = d.spawning.extraChanceDelta;
      state.aiDirector.runtime.poolOverrides = d.spawning.poolOverrides;
      state.aiDirector.runtime.flySpeedScale = d.flies.speedScale;
      state.aiDirector.runtime.flyFrogPullScale = d.flies.frogPullScale;
      state.aiDirector.runtime.rivalSpeedScale = d.rivals.speedScale;
      state.aiDirector.runtime.rivalAggressionScale = d.rivals.aggressionScale;
      state.aiDirector.runtime.rivalCornerHopScale = d.rivals.cornerHopScale;
      state.aiDirector.runtime.rivalTongueRateScale = d.rivals.tongueRateScale;
      state.aiDirector.runtime.weatherWindScale = d.environment.windScale;
      state.aiDirector.runtime.weatherLightningScale = d.environment.lightningScale;
      state.aiDirector.runtime.weatherDarknessScale = d.environment.darknessScale;
      state.aiDirector.runtime.weatherRainMode = d.environment.rainMode;
      state.aiDirector.runtime.weatherSnowMode = d.environment.snowMode;
      state.aiDirector.runtime.weatherHighWindMode = d.environment.highWindMode;
    }

    function buildLocalDirectorDirective() {
      const pressure = clamp((state.score / Math.max(1, state.levelGoal)) * 0.5 + state.level * 0.06, 0, 1.8);
      const swarmMood = Math.sin((state.frame + state.level * 33) * 0.021);
      const heavy = swarmMood > 0.45;
      const safe = swarmMood < -0.45;
      return {
        duration_s: 7 + Math.random() * 4,
        flavor_text: heavy ? 'SWARM SPIKE' : (safe ? 'CALM WINDOW' : 'MIXED FLOW'),
        environment: {
          wind_scale: heavy ? 1.25 : (safe ? 0.78 : 1),
          lightning_scale: clamp(0.9 + pressure * 0.6, 0.6, 1.9),
          darkness_scale: state.level >= 11 ? (safe ? 0.74 : (heavy ? 1.2 : 1)) : 1,
          rain_mode: state.level >= 4 && Math.random() < 0.15 ? 'on' : 'keep',
          snow_mode: state.level >= 8 && Math.random() < 0.1 ? 'on' : 'keep',
          high_wind_mode: heavy ? 'on' : 'keep'
        },
        spawning: {
          cap_delta: heavy ? 2 : (safe ? -1 : 0),
          interval_scale: heavy ? 0.84 : (safe ? 1.15 : 1),
          extra_chance_delta: heavy ? 0.06 : (safe ? -0.05 : 0),
          pool_overrides: {
            normal: clamp(0.42 - pressure * 0.08, 0.12, 0.52),
            grasshopper: clamp(0.16 + pressure * 0.05, 0.1, 0.25),
            bomb: clamp(0.08 + pressure * 0.08, 0.03, 0.22),
            firefly: clamp(0.07 + (safe ? 0.08 : 0), 0.05, 0.2),
            hourglass: clamp(0.06 + (safe ? 0.07 : 0), 0.04, 0.16),
            poison: clamp(0.06 + pressure * 0.05, 0.03, 0.18),
            spiral: clamp(0.08 + pressure * 0.06, 0.03, 0.24),
            medicinal: clamp(0.06 + (safe ? 0.06 : 0), 0.04, 0.18),
            letter: state.level >= 7 ? clamp(0.08 + (safe ? 0.04 : 0), 0.05, 0.18) : 0
          }
        },
        flies: {
          speed_scale: heavy ? 1.1 : (safe ? 0.92 : 1),
          frog_pull_scale: heavy ? 1.18 : (safe ? 0.86 : 1)
        },
        rivals: {
          speed_scale: clamp(0.96 + pressure * 0.18, 0.86, 1.3),
          aggression_scale: clamp(0.95 + pressure * 0.24, 0.84, 1.45),
          corner_hop_scale: heavy ? 1.16 : 0.95,
          tongue_rate_scale: heavy ? 1.14 : 0.92
        }
      };
    }

    function getDirectorSnapshot() {
      return {
        mode: state.mode,
        level: state.level,
        score: state.score,
        goal: state.levelGoal,
        lives: state.lives,
        combo: state.combo,
        flies: {
          count: state.flies.length,
          types: state.flies.reduce((acc, f) => {
            acc[f.id] = (acc[f.id] || 0) + 1;
            return acc;
          }, {})
        },
        effects: {
          glow: Number(state.effects.glow.toFixed(2)),
          poison: Number(state.effects.drunk.toFixed(2)),
          freeze: Number(state.effects.timeFreeze.toFixed(2)),
          night_vision: Number(state.effects.nightVision.toFixed(2)),
          directional_sight: Number(state.directionalSight.timer.toFixed(2))
        },
        rivals: activeRivals().map((rv) => ({
          type: rv.type,
          score: rv.score,
          health_pct: rv.maxHealth > 0 ? Number((rv.health / rv.maxHealth).toFixed(3)) : 0
        })),
        weather: {
          rain: state.weather.rain,
          snow: state.weather.snow,
          high_wind: state.weather.highWind,
          wind_x: Number(state.weather.windX.toFixed(2)),
          darkness: Number(state.weather.darkness.toFixed(2))
        }
      };
    }

    async function requestAIDirector() {
      if (!state.aiDirector.enabled || state.aiDirector.inFlight || state.mode !== MODE.PLAYING) return;
      state.aiDirector.inFlight = true;
      try {
        if (window.location.protocol === 'file:') throw new Error('file-mode');
        const res = await fetch('/api/director', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ game_state: getDirectorSnapshot() })
        });
        if (!res.ok) throw new Error(`director-http-${res.status}`);
        const body = await res.json();
        applyDirectorDirective(body.directive || buildLocalDirectorDirective(), body.source || 'OPENAI');
      } catch (err) {
        applyDirectorDirective(buildLocalDirectorDirective(), 'LOCAL');
      } finally {
        state.aiDirector.inFlight = false;
      }
    }

    function updateAIDirector(dt) {
      if (!state.aiDirector.enabled) return;
      if (state.mode !== MODE.PLAYING) return;

      if (state.aiDirector.directiveTimer > 0) {
        state.aiDirector.directiveTimer = Math.max(0, state.aiDirector.directiveTimer - dt);
        if (state.aiDirector.directiveTimer <= 0) {
          resetDirectorRuntime();
        }
      }

      state.aiDirector.tickS -= dt;
      if (state.aiDirector.tickS <= 0) {
        state.aiDirector.tickS = state.aiDirector.intervalS;
        requestAIDirector();
      }
    }

    function effectiveSpawnInterval() {
      return clamp(state.baseSpawnInterval * state.aiDirector.runtime.spawnIntervalScale, 0.22, 1.6);
    }

    function effectiveSpawnCap() {
      return clamp(state.baseSpawnCap + state.aiDirector.runtime.spawnCapDelta, 5, 36);
    }

    function effectiveSpawnExtraChance() {
      return clamp(state.baseSpawnExtraChance + state.aiDirector.runtime.spawnExtraChanceDelta, 0, 0.95);
    }

    function activeSpawnPool() {
      if (state.quest.active && !state.quest.completed && state.level === 7) {
        return { letter: 1 };
      }
      const basePool = state.aiDirector.runtime.poolOverrides || currentConfig().pool;
      const filtered = {};
      let total = 0;
      for (const k of Object.keys(basePool)) {
        if (!isFlyUnlocked(k, state.level)) continue;
        const v = Number(basePool[k]);
        if (!Number.isFinite(v) || v <= 0) continue;
        filtered[k] = v;
        total += v;
      }

      if (total <= 0) return { normal: 1 };

      // Competency shaping: keep level identity while adapting pressure.
      const scoreFactor = state.levelGoal > 0 ? state.score / state.levelGoal : 0;
      const comboFactor = state.combo > 1 ? Math.min(0.5, (state.combo - 1) * 0.06) : 0;
      const hpFactor = state.health.maxFrog > 0 ? state.health.frog / state.health.maxFrog : 1;
      const mastery = clamp(scoreFactor * 0.9 + comboFactor + hpFactor * 0.15, 0, 1.8);

      if (mastery < 0.55) {
        if (filtered.normal) filtered.normal *= 1.22;
        if (filtered.medicinal) filtered.medicinal *= 1.3;
        if (filtered.firefly) filtered.firefly *= 1.18;
        if (filtered.hourglass) filtered.hourglass *= 1.2;
        if (filtered.bomb) filtered.bomb *= 0.72;
        if (filtered.poison) filtered.poison *= 0.78;
        if (filtered.spiral) filtered.spiral *= 0.84;
      } else if (mastery > 1.05) {
        if (filtered.grasshopper) filtered.grasshopper *= 1.12;
        if (filtered.bomb) filtered.bomb *= 1.15;
        if (filtered.poison) filtered.poison *= 1.12;
        if (filtered.spiral) filtered.spiral *= 1.12;
        if (state.level >= 11 && state.weather.darkness > 0.28) {
          if (filtered.firefly) filtered.firefly *= state.effects.nightVision > 0 ? 1.05 : 1.75;
          if (filtered.hourglass) filtered.hourglass *= 0.9;
          if (filtered.normal) filtered.normal *= 0.8;
        }
        if (filtered.normal) filtered.normal *= 0.86;
      }

      return normalizePoolWeights(filtered, currentConfig().pool);
    }

    function activeRivals() {
      const list = [];
      if (state.rival.active) list.push(state.rival);
      if (state.rival2.active) list.push(state.rival2);
      return list;
    }

    function getRivalCorners() {
      const mx = 62;
      const my = 64;
      return [
        { x: mx, y: my },
        { x: state.width - mx, y: my },
        { x: state.width - mx, y: state.height - my },
        { x: mx, y: state.height - my }
      ];
    }

    function snapRivalToCorner(rv, idx) {
      const corners = getRivalCorners();
      const c = corners[clamp(idx, 0, corners.length - 1)];
      rv.cornerIndex = clamp(idx, 0, corners.length - 1);
      rv.x = c.x;
      rv.y = c.y;
      rv.vx = 0;
      rv.vy = 0;
    }

    function applyFrogDamage(amount, sourceLabel, color, sourceName = '') {
      if (amount <= 0) return false;
      if (state.effects.medicinal > 0) {
        playSound('medicine');
        addFloatText(frogX(), frogY() - 62, isHindi() ? 'ढाल बोली: बस!' : 'SHIELD BLOCK', '#d8ffe9');
        return false;
      }

      state.health.frog = Math.max(0, state.health.frog - amount);
      state.lives = Math.max(0, Math.ceil(state.health.frog / 20));
      state.shakeTimer = Math.max(state.shakeTimer, 0.22);
      state.shakePower = Math.max(state.shakePower, 7);
      playSound('hurt');
      if (sourceLabel) addFloatText(frogX(), frogY() - 62, sourceLabel, color || '#ffbdbd');

      if (state.health.frog <= 0) {
        const endName = sourceName || 'RIVAL';
        state.rival.result = isHindi() ? `${getHindiRivalEvent(endName, 'wins')} · ASCII Frog हार गया` : `${endName} DEFEATED ASCII FROG`;
        state.rival2.result = state.rival.result;
        state.mode = MODE.GAME_OVER;
      }
      updateHud();
      return true;
    }

    function launchChameleonTongue(rv) {
      if (!rv.active || rv.type !== 'chameleon') return;
      if (rv.chTongue.active) return;
      const tongueRate = state.aiDirector.runtime.rivalTongueRateScale;

      const mouthX = rv.x + (rv.x < state.cx ? 10 : -10);
      const mouthY = rv.y - 4;
      let targetX = frogX();
      let targetY = frogY() + 8;
      let targetFlyIndex = -1;
      let targetFly = null;

      if (state.flies.length > 0) {
        let best = Infinity;
        for (let i = 0; i < state.flies.length; i++) {
          const f = state.flies[i];
          if (f.camouflaged) continue;
          const d = Math.hypot(f.x - mouthX, f.y - mouthY);
          if (d < best) {
            best = d;
            targetFlyIndex = i;
            targetFly = f;
          }
        }
      }

      const targetFrog = !targetFly || Math.random() < clamp(0.46 * rv.aggression * state.aiDirector.runtime.rivalAggressionScale, 0.18, 0.86);
      if (!targetFrog && targetFly) {
        targetX = targetFly.x;
        targetY = targetFly.y;
      }

      const dx = targetX - mouthX;
      const dy = targetY - mouthY;
      const dist = Math.max(1, Math.hypot(dx, dy));
      const angle = Math.atan2(dy, dx);
      const maxLen = Math.min(420, dist + 12);

      rv.chTongue.active = true;
      rv.chTongue.angle = angle;
      rv.chTongue.len = 0;
      rv.chTongue.maxLen = maxLen;
      rv.chTongue.out = true;
      rv.chTongue.speedOut = 920 * tongueRate;
      rv.chTongue.speedIn = 0;
      rv.chTongue.catchGlyph = '';
      rv.chTongue.hitFrog = false;

      if (targetFrog) {
        rv.chTongue.hitFrog = true;
      } else if (targetFly && targetFlyIndex >= 0) {
        const caught = state.flies.splice(targetFlyIndex, 1)[0];
        if (caught) {
          rv.chTongue.catchGlyph = caught.id === 'letter' ? caught.letter : caught.def.glyph;
          const gain = caught.id === 'bomb' ? 12 : Math.max(6, caught.points);
          rv.score += gain;
          spawnBurst(caught.x, caught.y, '#9fffd5', 8, 0.36);
          addFloatText(rv.x, rv.y - 28, `${rv.name} TONGUE +${gain}`, '#b8ffe1');
        }
      }

      rv.eatCooldown = (1.05 + Math.random() * 0.85) / tongueRate;
    }

    function updateChameleonTongue(rv, dt) {
      if (!rv.chTongue.active) return;
      const t = rv.chTongue;
      if (t.out) {
        t.speedOut = Math.max(280, t.speedOut * 0.92);
        t.len += t.speedOut * dt;
        if (t.len >= t.maxLen) {
          t.len = t.maxLen;
          t.out = false;
          if (t.hitFrog) {
            applyFrogDamage(state.level >= 12 ? 16 : 11, 'CHAMELEON TONGUE!', '#ffcfb6', 'CHAMELEON');
          }
        }
      } else {
        t.speedIn += 360 * dt;
        t.len -= t.speedIn * dt;
        if (t.len <= 0) {
          t.len = 0;
          t.active = false;
          t.catchGlyph = '';
          t.hitFrog = false;
        }
      }
    }

    function resetRival(rv) {
      rv.active = false;
      rv.type = '';
      rv.name = '';
      rv.x = 0;
      rv.y = 0;
      rv.score = 0;
      rv.target = 0;
      rv.health = 0;
      rv.maxHealth = 0;
      rv.speed = 1;
      rv.aggression = 1;
      rv.vx = 0;
      rv.vy = 0;
      rv.eatCooldown = 0;
      rv.disturbCooldown = 0;
      rv.hitCooldown = 0;
      rv.cornerIndex = 0;
      rv.cornerTimer = 0;
      rv.chTongue.active = false;
      rv.chTongue.angle = 0;
      rv.chTongue.len = 0;
      rv.chTongue.maxLen = 0;
      rv.chTongue.out = true;
      rv.chTongue.speedOut = 760;
      rv.chTongue.speedIn = 0;
      rv.chTongue.catchGlyph = '';
      rv.chTongue.hitFrog = false;
      rv.result = '';
    }

    function setupRival(rv, data, x, y) {
      resetRival(rv);
      rv.active = true;
      rv.type = data.type;
      rv.name = data.name;
      rv.target = data.target;
      rv.speed = data.speed;
      rv.aggression = data.aggression;
      rv.maxHealth = rv.type === 'chameleon' ? 140 : 120;
      rv.health = rv.maxHealth;
      rv.x = x;
      rv.y = y;
      if (rv.type === 'chameleon') {
        rv.cornerIndex = Math.floor(Math.random() * 4);
        rv.cornerTimer = 1.2 + Math.random() * 1.6;
        snapRivalToCorner(rv, rv.cornerIndex);
      }
    }

    function buildBar(pct, size = 14) {
      const p = clamp(pct, 0, 1);
      const filled = Math.round(p * size);
      return `[${'#'.repeat(filled)}${'-'.repeat(size - filled)}] ${Math.round(p * 100)}%`;
    }

    function getWorldShiftLabel() {
      const note = (state.aiDirector.lastNote || '').toUpperCase();
      if (note.includes('CHAOS') || note.includes('SPIKE')) return isHindi() ? 'तूफ़ान बढ़ रहा है' : 'storm rising';
      if (note.includes('CALM') || note.includes('RECOVERY')) return isHindi() ? 'शांत मौका' : 'calm pocket';
      if (note.includes('RIVAL')) return isHindi() ? 'राइवल का दबाव' : 'rival pressure';
      if (note.includes('FLOW')) return isHindi() ? 'मिश्रित धारा' : 'mixed current';
      return '';
    }

    function getWorldLine() {
      const focus = getLevelFocus(state.level);
      const shift = getWorldShiftLabel();
      const envName = isHindi() ? getLocalizedEnvironmentName(state.currentEnv.name) : state.currentEnv.name.toLowerCase();
      const weatherName = isHindi() ? getLocalizedWeatherName(state.weather.baseName) : state.weather.baseName.toLowerCase();
      const worldParts = [envName, weatherName, focus.world];
      if (shift) worldParts.push(shift);
      return isHindi() ? `दुनिया: ${worldParts.join(' · ')}` : `WORLD: ${worldParts.join(' · ')}`;
    }

    function buildQuestDisplay() {
      if (!state.quest.active) return '';
      return state.quest.words.map((word, index) => {
        const done = index < state.quest.wordIndex
          ? word
          : (index > state.quest.wordIndex ? ''.padEnd(word.length, '_') : `${word.slice(0, state.quest.progress)}${'_'.repeat(Math.max(0, word.length - state.quest.progress))}`);
        return `${word} [${done}]`;
      }).join(' · ');
    }

    function getEnvironmentFooterNote() {
      if (state.level === 12 && state.finalChallenge.active) {
        return isHindi() ? `अंतिम तूफ़ान ${state.finalChallenge.timer.toFixed(1)}से` : `FINAL STORM ${state.finalChallenge.timer.toFixed(1)}S`;
      }
      if (state.quest.active && !state.quest.completed) {
        if (state.level === 7) return isHindi() ? `अक्षर दौड़ ${state.quest.timer.toFixed(1)}से` : `LETTER RUSH ${state.quest.timer.toFixed(1)}S`;
        const expected = state.quest.target[state.quest.progress] || state.quest.target[0] || '';
        return expected
          ? (isHindi() ? `अगला अक्षर ${expected}` : `NEXT LETTER ${expected}`)
          : (isHindi() ? `${state.quest.label} अक्षर` : `${state.quest.label} LETTERS`);
      }
      if (state.effects.timeFreeze > 0) return isHindi() ? 'टिक-टिक थमी · समय थमा है' : 'TIME HOLDING';
      if (state.effects.medicinal > 0) return isHindi() ? 'क्या बात है · X दबाओ, सीधी लाइन साफ़' : 'MED SHIELD · PRESS X FOR LINE';
      if (state.effects.hopeHalo > 0) return isHindi() ? 'होप का हेलो · पूरा घेरा वार' : 'HALO ACTIVE · FULL SWEEP';
      if (state.effects.hopeGiant > 0) return isHindi() ? 'वाह! विशाल मेंढक सक्रिय' : 'GIANT FROG ACTIVE';
      if (state.effects.loveRain > 0) return isHindi() ? 'प्रेम बरसा रे · दिलों की बारिश' : 'HEART RAIN FALLING';
      if (state.effects.loveJump > 0) return isHindi() ? 'LOVE शक्ति · अब लंबी छलांग' : 'LOVE BOOST · JUMP FARTHER';
      if (state.weather.darkness > 0.52 && state.effects.nightVision <= 0) return isHindi() ? 'घुप्प अंधेरा · जुगनू पकड़ो' : 'BLACKOUT · FIND A FIREFLY';
      if (state.directionalSight.timer > 0 && state.effects.nightVision > 0) {
        return state.directionalSight.armed
          ? (isHindi() ? `रोशनी ${getLocalizedDirection(state.directionalSight.dir)} · फिर दबाओ` : `TORCH ${state.directionalSight.dir} · PRESS AGAIN`)
          : (isHindi() ? `रोशनी ${getLocalizedDirection(state.directionalSight.dir)}` : `TORCH ${state.directionalSight.dir}`);
      }
      if (state.weather.darkness > 0.52 && state.effects.nightVision > 0) return isHindi() ? 'धूम! अंधेरा है · तीर दबाओ, रोशनी खोलो' : 'BLACKOUT · TAP ARROW TO SCAN';
      if (state.effects.nightVision > 0) return isHindi() ? `रात-दृष्टि ${state.effects.nightVision.toFixed(1)}से` : `NIGHT VISION ${state.effects.nightVision.toFixed(1)}S`;
      if (activeRivals().length > 0) return isHindi() ? `${getLocalizedWeatherName(state.weather.baseName)} · अँधेरी लहरें` : `${state.weather.baseName.toUpperCase()} · DARK PULSES`;
      if (state.weather.lightningTimer > 0) return isHindi() ? 'बिजली चमकी' : 'LIGHTNING FLASH';
      if (state.weather.rain) return isHindi() ? 'बारिश से दलदल फिसलन भरा है' : 'RAIN SLICKS THE MARSH';
      if (state.weather.snow) return isHindi() ? 'ठंडी हवा दलदल को धीमा करती है' : 'COLD AIR SLOWS THE SWAMP';
      if (state.weather.highWind || Math.abs(state.weather.windX) > 36) {
        return state.weather.windX >= 0
          ? (isHindi() ? 'आड़ी हवा दाएँ धकेल रही है' : 'CROSSWIND PUSHES RIGHT')
          : (isHindi() ? 'आड़ी हवा बाएँ धकेल रही है' : 'CROSSWIND PUSHES LEFT');
      }
      const shift = getWorldShiftLabel();
      if (shift) return isHindi() ? shift : shift.toUpperCase();
      return `${state.weather.baseName.toUpperCase()} · ${isHindi() ? getLevelFocus(state.level).world : getLevelFocus(state.level).world.toUpperCase()}`;
    }

    function getBottomFlashLine() {
      if (state.mode === MODE.START) return isHindi() ? 'मिशन: गिरगिट से पहले लेडी फ्रॉग तक पहुँचो, मेंढक महाराज' : 'MISSION: REACH LADY FROG BEFORE CHAMELEON DOES';
      if (state.mode === MODE.LEVEL_UP) return isHindi() ? 'स्तर पूरा' : 'LEVEL CLEAR';
      if (state.mode === MODE.PAUSED) return isHindi() ? 'रुका हुआ' : 'PAUSED';
      if (state.mode === MODE.GAME_OVER) return isHindi() ? 'दौड़ टूट गई' : 'RUN BROKEN';
      if (state.mode === MODE.WIN) return '';
      return getEnvironmentFooterNote();
    }

    function getObjectiveLine() {
      if (state.mode === MODE.START) return isHindi() ? 'लक्ष्य: मैदान पढ़ो, फिर सही समय पर वार करो।' : 'OBJECTIVE: WATCH THE FIELD, THEN STRIKE WITH INTENT.';
      if (state.level === 12 && state.finalChallenge.active) return isHindi() ? 'लक्ष्य: अंतिम तूफ़ान झेलो और अपनी राह बचाए रखो।' : 'OBJECTIVE: OUTLAST THE FINAL STORM AND KEEP YOUR LINE.';
      if (state.quest.active && !state.quest.completed) {
        return isHindi() ? `लक्ष्य: ${state.quest.label} को क्रम से पूरा करो।` : `OBJECTIVE: COMPLETE ${state.quest.label} IN ORDER.`;
      }
      const rivals = activeRivals();
      if (rivals.length > 0) {
        return isHindi()
          ? `लक्ष्य: ${rivals.map((rv) => getRivalShortName(rv)).join(' + ')} से आगे रहो, ${state.levelGoal} तक।`
          : `OBJECTIVE: STAY AHEAD OF ${rivals.map((rv) => rv.name.split(' ')[0]).join(' + ')} TO ${state.levelGoal}.`;
      }
      return isHindi() ? `लक्ष्य: ${getLevelFocus(state.level).objective}` : `OBJECTIVE: ${getLevelFocus(state.level).objective.toUpperCase()}`;
    }

    function getFocusLine() {
      const focus = getLevelFocus(state.level);
      return isHindi() ? `ध्यान: ${focus.title} · ${focus.cue}` : `FOCUS: ${focus.title} · ${focus.cue.toUpperCase()}`;
    }

    function getContextLine() {
      const rivals = activeRivals();
      if (rivals.length > 0) {
        return isHindi()
          ? `राइवल: ${rivals.map((rv) => `${getRivalShortName(rv)} ${Math.round((rv.health / Math.max(1, rv.maxHealth)) * 100)}%`).join(' | ')}`
          : `RIVAL: ${rivals.map((rv) => `${rv.name.split(' ')[0]} ${Math.round((rv.health / Math.max(1, rv.maxHealth)) * 100)}%`).join(' | ')}`;
      }
      if (state.effects.nightVision > 0) return isHindi() ? `स्थिति: रात-दृष्टि ${state.effects.nightVision.toFixed(1)}से · अब सब दिखेगा` : `STATE: NIGHT VISION ${state.effects.nightVision.toFixed(1)}s`;
      if (state.effects.hopeHalo > 0) return isHindi() ? `स्थिति: हेलो झाड़ू ${state.effects.hopeHalo.toFixed(1)}से · वाह!` : `STATE: HALO SWEEP ${state.effects.hopeHalo.toFixed(1)}s`;
      if (state.effects.loveJump > 0) return isHindi() ? `स्थिति: LOVE छलांग ${state.effects.loveJump.toFixed(1)}से · क्या बात है` : `STATE: LOVE LEAP ${state.effects.loveJump.toFixed(1)}s`;
      if (state.effects.timeFreeze > 0) return isHindi() ? `स्थिति: समय रुका ${state.effects.timeFreeze.toFixed(1)}से · सब थम गया` : `STATE: TIME FREEZE ${state.effects.timeFreeze.toFixed(1)}s`;
      if (state.effects.medicinal > 0) return isHindi() ? `स्थिति: औषधि ढाल ${state.effects.medicinal.toFixed(1)}से · X से लाइन साफ़` : `STATE: MED SHIELD+BOMB+REGEN ${state.effects.medicinal.toFixed(1)}s · X LINE`;
      if (state.effects.glow > 0) return isHindi() ? `स्थिति: चमक ${state.effects.glow.toFixed(1)}से · झकास` : `STATE: GLOW ${state.effects.glow.toFixed(1)}s`;
      if (state.effects.spiral > 0) return isHindi() ? `स्थिति: स्पाइरल ${state.effects.spiral.toFixed(1)}से · घूमो और चटो` : `STATE: SPIRAL ${state.effects.spiral.toFixed(1)}s`;
      if (state.effects.drunk > 0) return isHindi() ? `स्थिति: निशाना डगमग ${state.effects.drunk.toFixed(1)}से · अरे बाप रे` : `STATE: CONFUSED ${state.effects.drunk.toFixed(1)}s`;
      if (state.level >= 3 && state.frog.jumpCooldown > 0) return isHindi() ? `स्थिति: छलांग ठंडी ${state.frog.jumpCooldown.toFixed(1)}से · थोड़ा ठहरो` : `STATE: JUMP COOLING ${state.frog.jumpCooldown.toFixed(1)}s`;
      return isHindi() ? getWorldLine() : getWorldLine().toUpperCase();
    }

    function weatherForLevel(level) {
      const table = {
        1: { name: 'SWAMP MIRROR', wind: 0.08, rain: false, snow: false, highWind: false, lightning: 0 },
        2: { name: 'RIPPLE WIND', wind: 0.65, rain: false, snow: false, highWind: true, lightning: 0 },
        3: { name: 'CROSS CURRENT', wind: 0.24, rain: true, snow: false, highWind: false, lightning: 0 },
        4: { name: 'STILL POND', wind: 0.12, rain: false, snow: false, highWind: false, lightning: 0 },
        5: { name: 'ORDERED GLOW', wind: 0.18, rain: false, snow: true, highWind: false, lightning: 0 },
        6: { name: 'RISING TIDE', wind: 0.42, rain: true, snow: false, highWind: true, lightning: 0 },
        7: { name: 'MIRROR MARSH', wind: 0.2, rain: false, snow: false, highWind: false, lightning: 0 },
        8: { name: 'MEMORY FOG', wind: 0.34, rain: false, snow: true, highWind: true, lightning: 0 },
        9: { name: 'DOUBLE CURRENT', wind: 0.52, rain: true, snow: false, highWind: true, lightning: 0.0015 },
        10: { name: 'FALSE CALM', wind: 0.36, rain: true, snow: false, highWind: false, lightning: 0.0034 },
        11: { name: 'DUEL MARSH', wind: 0.24, rain: true, snow: false, highWind: true, lightning: 0.0044 },
        12: { name: 'FINAL CORRIDOR', wind: 0.44, rain: false, snow: true, highWind: true, lightning: 0.0052 }
      };
      return table[level] || table[1];
    }

    function setupWeather() {
      const w = weatherForLevel(state.level);
      state.weather.baseName = w.name;
      state.weather.baseWind = w.wind;
      state.weather.baseDarkness = 0;
      state.weather.baseRain = w.rain;
      state.weather.baseSnow = w.snow;
      state.weather.baseHighWind = w.highWind;
      state.weather.baseLightningChance = w.lightning || 0;
      state.weather.name = w.name;
      state.weather.windX = w.wind * 120;
      state.weather.rain = w.rain;
      state.weather.snow = w.snow;
      state.weather.highWind = w.highWind;
      state.weather.lightningChance = w.lightning || 0;
      state.weather.lightningTimer = 0;
      state.weather.lightningX = state.width * 0.5;
      state.weather.darkness = state.weather.baseDarkness;
      state.weather.particles = [];
      const count = w.rain ? 120 : (w.snow ? 95 : (w.highWind ? 70 : 26));
      for (let i = 0; i < count; i++) {
        state.weather.particles.push({
          x: Math.random() * state.width,
          y: Math.random() * state.height,
          vx: (Math.random() - 0.5) * 28,
          vy: 26 + Math.random() * 84,
          len: 6 + Math.random() * 12
        });
      }
    }

    function updateHud() {
      const focus = getLevelFocus(state.level);
      scoreLine.textContent = isHindi() ? `स्कोर ${state.score}` : `SCORE ${state.score}`;
      levelLine.textContent = isHindi() ? `स्तर ${state.level} · ${focus.title}` : `LEVEL ${state.level} · ${focus.title}`;
      frogHealthLine.textContent = isHindi()
        ? `ASCII जीवन ${buildBar(state.health.frog / Math.max(1, state.health.maxFrog), 10)}`
        : `ASCII HP ${buildBar(state.health.frog / Math.max(1, state.health.maxFrog), 10)}`;

      let progressPct = 0;
      if (state.level === 12 && state.finalChallenge.active) {
        progressPct = 1 - state.finalChallenge.timer / Math.max(1, state.finalChallenge.duration);
        progressLine.textContent = isHindi() ? `बचाव ${buildBar(progressPct)}` : `SURVIVAL ${buildBar(progressPct)}`;
      } else if (state.level === 7 && state.quest.active) {
        progressPct = 1 - state.quest.timer / Math.max(1, state.quest.duration);
        progressLine.textContent = isHindi() ? `अक्षर समय ${buildBar(progressPct)}` : `LETTER TIMER ${buildBar(progressPct)}`;
      } else {
        const scorePct = state.levelGoal > 0 ? state.score / state.levelGoal : 1;
        if (state.quest.active) {
          const qp = state.quest.target.length > 0 ? state.quest.progress / state.quest.target.length : 1;
          progressPct = Math.min(scorePct, qp);
        } else {
          progressPct = scorePct;
        }
        progressLine.textContent = isHindi() ? `प्रगति ${buildBar(progressPct)}` : `PROGRESS ${buildBar(progressPct)}`;
      }

      const hideUi = state.mode === MODE.WIN;
      hud.style.display = hideUi ? 'none' : 'grid';
      help.style.display = hideUi ? 'none' : 'block';
      flashBar.classList.toggle('show', !hideUi);
      flashLine.textContent = getBottomFlashLine();
      if (activeRivals().length) {
        questLine.textContent = isHindi()
          ? `राइवल ${activeRivals().map((rv) => `${getRivalShortName(rv)} ${rv.score}/${rv.target}`).join(' | ')}`
          : `RIVAL ${activeRivals().map((rv) => `${rv.name.split(' ')[0]} ${rv.score}/${rv.target}`).join(' | ')}`;
      } else if (state.quest.active) {
        questLine.textContent = state.level === 7
          ? `${buildQuestDisplay()} · ${state.quest.timer.toFixed(1)}${isHindi() ? 'से' : 'S'}`
          : buildQuestDisplay();
      } else if (state.level === 12 && state.finalChallenge.active) {
        questLine.textContent = isHindi() ? `समय ${state.finalChallenge.timer.toFixed(1)}से` : `TIMER ${state.finalChallenge.timer.toFixed(1)}S`;
      } else {
        questLine.textContent = getContextLine();
      }
      updateMobileControlsState();
    }

    function saveHighScore() {
      if (state.score > state.highScore) {
        state.highScore = state.score;
        localStorage.setItem('ascii-frog-high-score', String(state.highScore));
      }
    }

    function setLevel(level) {
      state.level = clamp(level, 1, state.maxLevel);
      const cfg = currentConfig();
      state.currentEnv = environments[(state.level - 1) % environments.length];
      state.levelGoal = cfg.goal;
      state.baseSpawnInterval = cfg.interval;
      state.baseSpawnCap = cfg.cap;
      state.baseSpawnExtraChance = cfg.extraChance;
      state.spawnInterval = cfg.interval;
      state.spawnCap = cfg.cap;
      state.spawnExtraChance = cfg.extraChance;
      state.spawnClock = 0;
      resetDirectorRuntime();
      state.aiDirector.tickS = 0.6 + Math.random() * 0.8;
      state.levelIntroTimer = 2.1;

        state.quest.reward = 550;
        state.quest.spawnCycle = 0;
        state.quest.duration = 28;
        state.quest.timer = state.quest.duration;
        state.quest.timedOut = false;
      } else {
        state.quest.active = false;
        state.quest.words = ['LOVE', 'HOPE'];
        state.quest.wordIndex = 0;
        state.quest.target = 'LOVE';
        state.quest.label = 'LOVE';
        state.quest.reward = 550;
        state.quest.spawnCycle = 0;
        state.quest.duration = 0;
        state.quest.timer = 0;
        state.quest.timedOut = false;
