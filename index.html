    function draw() {
      if (state.mode === MODE.WIN) {
        if (state.ending.timer >= getEndingCelebrationDuration() - getEndingCelebrationFadeWindow()) {
          drawBackground();
        } else {
          ctx.clearRect(0, 0, state.width, state.height);
        }
        drawOverlays();
        return;
      }

      ctx.save();
      if (state.shakeTimer > 0) {
        const p = state.shakePower * (state.shakeTimer / 0.62);
        const ox = (Math.random() - 0.5) * p;
        const oy = (Math.random() - 0.5) * p;
        ctx.translate(ox, oy);
      }

      drawBackground();
      drawMedicinalAimLine();
      drawSweepEffect();
      drawTongue();
      drawFrog();
      drawRivals();
      drawFinalBullets();
      for (const fly of state.flies) fly.draw();
      for (const p of state.particles) p.draw();
      drawFloatTexts();
      ctx.restore();

      drawOverlays();
      drawCheatSheet();
    }

    function tick(ts) {
      if (!previousTs) previousTs = ts;
      let delta = (ts - previousTs) / 1000;
      if (delta > 0.12) delta = 0.12;
      previousTs = ts;
      accumulator += delta;

      while (accumulator >= FIXED_STEP) {
        update(FIXED_STEP);
        accumulator -= FIXED_STEP;
      }

      draw();
      rafId = requestAnimationFrame(tick);
    }

    function bindControls() {
      window.addEventListener('pointerdown', (e) => {
        if (maybeHandleStartScreenPointer(e)) {
          unlockAudio();
          return;
        }
        unlockAudio();
        startBitMusic();
      });

      window.addEventListener('touchstart', unlockAudio, { passive: true });
      window.addEventListener('mousedown', unlockAudio);

      window.addEventListener('keydown', (e) => {
        keysDown.add(e.code);
        unlockAudio();

        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space', 'KeyX'].includes(e.code)) {
          e.preventDefault();
        }
        if (e.repeat && ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
          return;
        }

        if (state.mode === MODE.START) {
          ensureAudio();
          startBitMusic();
        }

        const key = e.key.toLowerCase();

        // Secret testing cheats.
        if (e.ctrlKey && key === 'f') {
          e.preventDefault();
          cheatNextLevel();
          return;
        }
        if (e.ctrlKey && key === 'o') {
          e.preventDefault();
          cheatSweep();
          return;
        }
        if (e.ctrlKey && key === '/') {
          e.preventDefault();
          state.showCheatSheet = !state.showCheatSheet;
          return;
        }

        if (key === 'p') {
          if (state.mode !== MODE.START && state.mode !== MODE.WIN && state.mode !== MODE.GAME_OVER) togglePause();
          return;
        }

        if (key === 'm') {
          toggleMute();
          return;
        }

        if (key === 'l' && state.mode === MODE.START) {
          toggleLanguage();
          return;
        }

        if (key === 'f') {
          toggleFullscreen();
          return;
        }

        if (e.code === 'Enter') {
          clearPendingArrowShot();
          if (state.mode === MODE.START || state.mode === MODE.WIN || state.mode === MODE.GAME_OVER) {
            startGameFromMenu();
          }
          return;
        }

        if (e.code === 'Space') {
          clearPendingArrowShot();
          if (state.mode === MODE.PLAYING && state.level >= 3) {
            let jumpDir = state.frog.facing;
            if (keysDown.has('ArrowUp')) jumpDir = 'UP';
            else if (keysDown.has('ArrowDown')) jumpDir = 'DOWN';
            else if (keysDown.has('ArrowLeft')) jumpDir = 'LEFT';
            else if (keysDown.has('ArrowRight')) jumpDir = 'RIGHT';
            state.frog.facing = jumpDir;
            triggerJump(jumpDir);
          }
          return;
        }

        if (e.code === 'KeyX') {
          clearPendingArrowShot();
          triggerMedicinalLineShot();
          return;
        }

        if (state.mode === MODE.PLAYING || state.mode === MODE.START) {
          if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
            const baseDir = getCardinalFromArrowCode(e.code);
            state.frog.facing = baseDir;
            if (keysDown.has('Space') && state.mode === MODE.PLAYING && state.level >= 3) {
              clearPendingArrowShot();
              triggerJump(baseDir);
            } else {
              queueArrowShot(e.code);
            }
          }
        }
      });

      window.addEventListener('keyup', (e) => {
        keysDown.delete(e.code);
        if (pendingArrowCode === e.code) {
          clearPendingArrowShot();
        }
      });

      const touchMap = [
        ['btn-up', 'UP'],
        ['btn-down', 'DOWN'],
        ['btn-left', 'LEFT'],
        ['btn-right', 'RIGHT']
      ];

      for (const [id, dir] of touchMap) {
        const btn = document.getElementById(id);
        const trigger = (ev) => {
          ev.preventDefault();
          unlockAudio();
          state.frog.facing = dir;
          if (state.mobileJumpArmed && state.mode === MODE.PLAYING && state.level >= 3) {
            triggerJump(dir);
            return;
          }
          if (canUseDirectionalSight(dir)) {
            handleNightVisionArrow(dir);
          } else {
            state.directionalSight.armed = false;
            shootTongue(dir);
          }
        };
        btn.addEventListener('pointerdown', trigger);
        btn.addEventListener('touchstart', trigger, { passive: false });
        btn.addEventListener('mousedown', trigger);
      }

      const bindActionButton = (btn, handler) => {
        if (!btn) return;
        const trigger = (ev) => {
          ev.preventDefault();
          unlockAudio();
          handler();
        };
        btn.addEventListener('pointerdown', trigger);
        btn.addEventListener('touchstart', trigger, { passive: false });
        btn.addEventListener('mousedown', trigger);
      };

      bindActionButton(btnStart, () => {
        clearPendingArrowShot();
        clearMobileJumpArm();
        if (state.mode === MODE.START || state.mode === MODE.GAME_OVER || state.mode === MODE.WIN) {
          startGameFromMenu();
        } else if (state.mode === MODE.PLAYING || state.mode === MODE.PAUSED) {
          startGameFromMenu();
        }
      });

      bindActionButton(btnPause, () => {
        if (state.mode !== MODE.START && state.mode !== MODE.WIN && state.mode !== MODE.GAME_OVER) {
          togglePause();
        }
      });

      bindActionButton(btnJump, () => {
        if (state.mode !== MODE.PLAYING || state.level < 3) return;
        state.mobileJumpArmed = !state.mobileJumpArmed;
        if (state.mobileJumpArmed) {
          addFloatText(frogX(), frogY() - 84, isHindi() ? 'दिशा चुनो, फिर कूदो' : 'PICK A DIRECTION TO JUMP', '#d7ffd8');
        }
        updateMobileControlsState();
      });

      bindActionButton(btnLine, () => {
        clearMobileJumpArm();
        triggerMedicinalLineShot();
      });

      bindActionButton(btnMute, () => {
        clearMobileJumpArm();
        toggleMute();
      });

      bindActionButton(btnFull, () => {
        clearMobileJumpArm();
        toggleFullscreen();
      });

      window.addEventListener('resize', resize);
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden && !audioState.muted) unlockAudio();
      });
      document.addEventListener('fullscreenchange', resize);
    }

    function renderGameToText() {
      const tongue = state.tongue;
      const payload = {
        coordinate_system: 'origin=(0,0) top-left; +x right; +y down',
        language: state.language,
        mode: state.mode,
        score: state.score,
        high_score: state.highScore,
        level: state.level,
        level_goal: state.levelGoal,
        combo: state.combo,
        environment: state.currentEnv.name,
        weather: {
          name: state.weather.name,
          wind_x: Number(state.weather.windX.toFixed(2)),
          rain: state.weather.rain,
          snow: state.weather.snow,
          lightning_s: Number(state.weather.lightningTimer.toFixed(2)),
          darkness: Number(state.weather.darkness.toFixed(2))
        },
        ai_director: {
          enabled: state.aiDirector.enabled,
          source: state.aiDirector.source,
          active: state.aiDirector.runtime.active,
          note: state.aiDirector.lastNote,
          ttl_s: Number(state.aiDirector.directiveTimer.toFixed(2))
        },
        frog: {
          x: Number(frogX().toFixed(1)),
          y: Number(frogY().toFixed(1)),
          health: Number(state.health.frog.toFixed(1)),
          max_health: Number(state.health.maxFrog.toFixed(1)),
          confused_eyes: state.effects.drunk > 0,
          glowing: state.effects.glow > 0,
          night_vision: state.effects.nightVision > 0,
          love_jump: state.effects.loveJump > 0,
          hope_halo: state.effects.hopeHalo > 0,
          directional_sight: state.directionalSight.timer > 0,
          directional_dir: state.directionalSight.dir,
          directional_ready: state.directionalSight.armed,
          jump_height: Number(state.frog.jumpZ.toFixed(1)),
          jump_cooldown_s: Number(state.frog.jumpCooldown.toFixed(2)),
          facing: state.frog.facing
        },
        tongue: {
          state: tongue.state,
          dir: tongue.dirName,
          length: Number(tongue.length.toFixed(1)),
          max_length: Number(tongue.maxLength.toFixed(1)),
          sticky_mode: state.effects.medicinal > 0,
          confused_curve: tongue.drunkShot,
          med_line_active: state.medAim.active,
          mobile_jump_armed: state.mobileJumpArmed
        },
        effects: {
          glow_s: Number(Math.max(0, state.effects.glow).toFixed(2)),
          confused_s: Number(Math.max(0, state.effects.drunk).toFixed(2)),
          spiral_s: Number(Math.max(0, state.effects.spiral).toFixed(2)),
          medicinal_s: Number(Math.max(0, state.effects.medicinal).toFixed(2)),
          time_freeze_s: Number(Math.max(0, state.effects.timeFreeze).toFixed(2)),
          night_vision_s: Number(Math.max(0, state.effects.nightVision).toFixed(2)),
          love_jump_s: Number(Math.max(0, state.effects.loveJump).toFixed(2)),
          love_rain_s: Number(Math.max(0, state.effects.loveRain).toFixed(2)),
          hope_halo_s: Number(Math.max(0, state.effects.hopeHalo).toFixed(2)),
          hope_giant_s: Number(Math.max(0, state.effects.hopeGiant).toFixed(2)),
          directional_sight_s: Number(Math.max(0, state.directionalSight.timer).toFixed(2)),
          directional_ready: state.directionalSight.armed
        },
        quest: {
          active: state.quest.active,
          completed: state.quest.completed,
          label: state.quest.label,
          target: state.quest.target,
          progress: state.quest.progress,
          words: state.quest.words.slice(),
          word_index: state.quest.wordIndex,
          timer: Number(state.quest.timer.toFixed(2)),
          duration: Number(state.quest.duration.toFixed(2)),
          timed_out: state.quest.timedOut
        },
        flies: state.flies.slice(0, 30).map((f) => ({
          type: f.id,
          letter: f.letter || '',
          x: Number(f.x.toFixed(1)),
          y: Number(f.y.toFixed(1)),
          points: f.points,
          cloaked: !!f.camouflaged
        })),
        particles_visible: state.particles.length,
        sweep: {
          active: state.sweep.active,
          angle: Number(state.sweep.angle.toFixed(2)),
          range: Number(state.sweep.range.toFixed(1)),
          bomb_protected: state.sweep.protectBombs
        },
        rival: {
          active: state.rival.active,
          type: state.rival.type,
          name: state.rival.name,
          score: state.rival.score,
          target: state.rival.target,
          health: state.rival.health,
          max_health: state.rival.maxHealth,
          x: Number(state.rival.x.toFixed(1)),
          y: Number(state.rival.y.toFixed(1)),
          corner_index: state.rival.cornerIndex,
          tongue_active: !!(state.rival.chTongue && state.rival.chTongue.active),
          tongue_len: Number((state.rival.chTongue ? state.rival.chTongue.len : 0).toFixed(1)),
          result: state.rival.result
        },
        rival2: {
          active: state.rival2.active,
          type: state.rival2.type,
          name: state.rival2.name,
          score: state.rival2.score,
          target: state.rival2.target,
          health: state.rival2.health,
          max_health: state.rival2.maxHealth,
          x: Number(state.rival2.x.toFixed(1)),
          y: Number(state.rival2.y.toFixed(1)),
          corner_index: state.rival2.cornerIndex,
          tongue_active: !!(state.rival2.chTongue && state.rival2.chTongue.active),
          tongue_len: Number((state.rival2.chTongue ? state.rival2.chTongue.len : 0).toFixed(1)),
          result: state.rival2.result
        },
        ending: {
          phase: getEndingPhase(),
          scene: getEndingScene(),
          scene_blend: Number(getEndingStarryBlend().toFixed(2)),
          hearts_visible: state.ending.hearts.length,
          left_catch_s: Number(state.ending.leftCatchTimer.toFixed(2)),
          right_catch_s: Number(state.ending.rightCatchTimer.toFixed(2))
        },
        final_challenge: {
          active: state.finalChallenge.active,
          timer: Number(state.finalChallenge.timer.toFixed(2)),
          duration: Number(state.finalChallenge.duration.toFixed(2)),
          bullets: state.finalChallenge.bullets.slice(0, 25).map((b) => ({
            x: Number(b.x.toFixed(1)),
            y: Number(b.y.toFixed(1))
          }))
        },
        cheats: {
          ctrl_f_next_level: true,
          ctrl_o_sweep: true
        }
      };
      return JSON.stringify(payload);
    }

    window.render_game_to_text = renderGameToText;

    window.advanceTime = (ms) => {
      const steps = Math.max(1, Math.round(ms / (1000 / 60)));
      for (let i = 0; i < steps; i++) update(FIXED_STEP);
      draw();
    };

    function init() {
      resize();
      bindControls();
      localStorage.removeItem('ascii-frog-language');
      resetRun();
      state.mode = MODE.START;
      updateLanguageUi();
      updateHud();
      draw();
      if (rafId) cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(tick);
    }

    init();
  </script>
</body>
</html>
